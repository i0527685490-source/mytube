<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body.light {
  --bg:#ffffff; --bg2:#f9f9f9; --bg3:#f1f1f1; --bg4:#e0e0e0;
  --txt:#0f0f0f; --txt2:#555; --txt3:#888;
  --skel1:#e8e8e8; --skel2:#d0d0d0;
  --border:rgba(0,0,0,0.08); --shadow:rgba(0,0,0,0.12);
  --modal-bg:rgba(0,0,0,0.7);
}
body.dark {
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#272727; --bg4:#3f3f3f;
  --txt:#f1f1f1; --txt2:#aaa; --txt3:#717171;
  --skel1:#272727; --skel2:#3f3f3f;
  --border:rgba(255,255,255,0.08); --shadow:rgba(0,0,0,0.5);
  --modal-bg:rgba(0,0,0,0.88);
}
:root{--red:#ff0000;--red2:#cc0000;--blue:#3ea6ff;--like:#ff4e4e;--sw:240px;--sc:72px;--th:56px;--ease:0.2s cubic-bezier(0.4,0,0.2,1);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Rubik',sans-serif;overflow-x:hidden;min-height:100vh;transition:background .2s,color .2s;}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--th);background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200;border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.tbtn{background:none;border:none;cursor:pointer;color:var(--txt);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--ease);}
.tbtn:hover{background:var(--bg3);}
.tbtn svg{width:22px;height:22px;fill:currentColor;}
#logo{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0;}
.logo-badge{background:var(--red);border-radius:8px;width:34px;height:24px;display:flex;align-items:center;justify-content:center;transition:transform var(--ease),box-shadow var(--ease);}
#logo:hover .logo-badge{transform:scale(1.08);box-shadow:0 0 16px rgba(255,0,0,.4);}
.logo-badge svg{width:15px;height:15px;fill:#fff;}
.logo-txt{font-size:17px;font-weight:700;letter-spacing:-.5px;color:var(--txt);}
.logo-txt span{color:var(--red);}
#search-area{flex:1;max-width:540px;display:flex;align-items:center;margin:0 auto;direction:ltr;position:relative;}
#search-input{flex:1;background:var(--bg2);border:1.5px solid var(--bg4);border-right:none;border-radius:24px 0 0 24px;padding:8px 16px;color:var(--txt);font-size:14px;font-family:'Rubik',sans-serif;outline:none;direction:rtl;transition:border-color var(--ease),background var(--ease);}
#search-input:focus{border-color:var(--blue);background:var(--bg3);}
#search-input::placeholder{color:var(--txt3);}
#search-btn{background:var(--bg3);border:1.5px solid var(--bg4);border-left:none;border-radius:0 24px 24px 0;padding:0 18px;height:38px;cursor:pointer;color:var(--txt);display:flex;align-items:center;transition:background var(--ease);}
#search-btn:hover{background:var(--bg4);}
#search-btn svg{width:18px;height:18px;fill:currentColor;}
#search-drop{position:absolute;top:44px;right:0;left:0;background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;box-shadow:0 8px 24px var(--shadow);z-index:300;display:none;overflow:hidden;}
#search-drop.show{display:block;}
.sdrop-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background var(--ease);direction:rtl;font-size:13px;}
.sdrop-item:hover{background:var(--bg3);}
.sdrop-item svg{width:16px;height:16px;fill:var(--txt3);flex-shrink:0;}
.sdrop-label{font-size:10px;color:var(--txt3);font-weight:600;padding:6px 16px 2px;text-transform:uppercase;letter-spacing:.5px;}
.tb-r{display:flex;align-items:center;gap:6px;margin-inline-start:auto;flex-shrink:0;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ffd93d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;transition:transform var(--ease);}
.avatar:hover{transform:scale(1.1);}
.bell-wrap{position:relative;}
.notif-badge{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:var(--red);font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;color:#fff;pointer-events:none;border:2px solid var(--bg);}
.notif-badge.vis{display:flex;}

/* SIDEBAR */
#sidebar{position:fixed;top:var(--th);right:0;width:var(--sw);height:calc(100vh - var(--th));background:var(--bg);overflow-y:auto;overflow-x:hidden;padding:8px 0 24px;z-index:100;transition:width var(--ease);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
#sidebar.col{width:var(--sc);}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
.sb-div{height:1px;background:var(--border);margin:8px 0;}
.sb-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:8px 20px 4px;white-space:nowrap;overflow:hidden;transition:opacity var(--ease),height var(--ease),padding var(--ease);height:28px;}
#sidebar.col .sb-label{opacity:0;height:0;padding:0;}
.nitem{display:flex;align-items:center;height:40px;padding:0 20px;gap:20px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);text-decoration:none;color:var(--txt);white-space:nowrap;overflow:hidden;}
.nitem:hover{background:var(--bg3);}
.nitem.on{background:var(--bg3);}
.nitem.on .ni{color:var(--red);}
.ni{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ni svg{width:22px;height:22px;fill:currentColor;}
.nl{font-size:13px;}
#sidebar.col .nl{display:none;}
#sidebar.col .nitem{padding:0;justify-content:center;gap:0;}
.chitem{display:flex;align-items:center;gap:10px;height:40px;padding:0 12px 0 8px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);color:var(--txt);white-space:nowrap;overflow:hidden;}
.chitem:hover{background:var(--bg3);}
.chitem.active{background:var(--bg3);}
.chdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative;}
.chdot .ndot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none;}
.chdot.hn .ndot{display:block;}
.chname{font-size:13px;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
#sidebar.col .chitem{padding:0;justify-content:center;gap:0;}
#sidebar.col .chname{display:none;}
.sb-empty{padding:8px 20px;font-size:12px;color:var(--txt3);line-height:1.5;}

/* MAIN */
#main{margin-top:var(--th);margin-right:var(--sw);padding:20px 28px;transition:margin-right var(--ease);min-height:calc(100vh - var(--th));}
#main.col{margin-right:var(--sc);}

/* Chips */
#chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:none;direction:ltr;}
#chips::-webkit-scrollbar{display:none;}
.chip{background:var(--bg3);color:var(--txt);border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Rubik',sans-serif;transition:background var(--ease),transform .1s;}
.chip:hover{background:var(--bg4);transform:translateY(-1px);}
.chip.on{background:var(--txt);color:var(--bg);}

/* HERO */
#hero{margin-bottom:32px;display:none;}
#hero.show{display:block;}
.hero-inner{display:grid;grid-template-columns:1fr 320px;background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 40px var(--shadow);}
.hero-player-wrap{position:relative;aspect-ratio:16/9;background:#000;cursor:pointer;}
.hero-player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.hero-thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);transition:background var(--ease);}
.hero-player-wrap:hover .hero-play-btn{background:rgba(0,0,0,.15);}
.hero-play-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,0,0,.9);display:flex;align-items:center;justify-content:center;transition:transform var(--ease),box-shadow var(--ease);}
.hero-player-wrap:hover .hero-play-circle{transform:scale(1.12);box-shadow:0 0 32px rgba(255,0,0,.5);}
.hero-play-circle svg{width:28px;height:28px;fill:#fff;margin-inline-start:4px;}
.hero-playing .hero-thumb,.hero-playing .hero-play-btn{display:none;}
.hero-info{padding:22px 18px;display:flex;flex-direction:column;direction:rtl;overflow:hidden;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.2);color:var(--red);font-size:11px;font-weight:600;border-radius:20px;padding:4px 10px;margin-bottom:10px;width:fit-content;}
.hero-title{font-size:16px;font-weight:600;line-height:1.4;color:var(--txt);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-ch{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.hero-ch-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.hero-ch-name{font-size:13px;color:var(--txt2);}
.hero-desc{font-size:12px;color:var(--txt3);line-height:1.6;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.hero-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-btn{display:flex;align-items:center;gap:6px;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-family:'Rubik',sans-serif;cursor:pointer;font-weight:500;transition:all var(--ease);}
.hero-btn.primary{background:var(--red);color:#fff;}
.hero-btn.primary:hover{background:var(--red2);}
.hero-btn.secondary{background:var(--bg3);color:var(--txt);}
.hero-btn.secondary:hover{background:var(--bg4);}
.hero-btn svg{width:15px;height:15px;fill:currentColor;}
.hero-btn.liked{background:rgba(255,78,78,.18);color:var(--like);}
.hero-btn.followed{background:rgba(62,166,255,.15);color:var(--blue);}

/* New videos banner */
.new-vids-banner{background:linear-gradient(135deg,rgba(255,0,0,.08),rgba(255,0,0,.03));border:1px solid rgba(255,0,0,.15);border-radius:10px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt2);}
.new-vids-banner svg{width:16px;height:16px;fill:var(--red);flex-shrink:0;}

/* Channel page */
.ch-page-hdr{display:flex;align-items:center;gap:14px;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.ch-page-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;}
.ch-page-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.ch-page-sub{font-size:13px;color:var(--txt3);}
.ch-follow-btn{background:var(--red);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px;font-family:'Rubik',sans-serif;cursor:pointer;font-weight:600;transition:background var(--ease);}
.ch-follow-btn:hover{background:var(--red2);}
.ch-follow-btn.following{background:var(--bg3);color:var(--txt);}
.ch-follow-btn.following:hover{background:var(--bg4);}

/* Channel search result */
.ch-result{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ch-result-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.ch-result-name{font-size:16px;font-weight:600;transition:color var(--ease);}
.ch-result:hover .ch-result-name{color:var(--blue);}
.ch-result-sub{font-size:12px;color:var(--txt3);margin-top:2px;}
.ch-result-tag{font-size:10px;font-weight:600;background:rgba(62,166,255,.15);color:var(--blue);border-radius:4px;padding:2px 7px;margin-top:4px;width:fit-content;}

/* Sections */
.section{margin-bottom:40px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-size:16px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sec-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.sec-ico svg{width:14px;height:14px;fill:currentColor;}
.sec-badge{font-size:10px;font-weight:600;background:rgba(62,166,255,.15);color:var(--blue);border-radius:10px;padding:2px 8px;}
.sec-new-badge{font-size:10px;font-weight:600;background:rgba(255,0,0,.18);color:var(--red);border-radius:10px;padding:2px 8px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.sec-count{font-size:13px;color:var(--txt3);}
.play-all-btn{background:var(--txt);color:var(--bg);border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif;display:flex;align-items:center;gap:6px;transition:opacity var(--ease);}
.play-all-btn:hover{opacity:0.8;}
.play-all-btn svg{width:14px;height:14px;fill:currentColor;}

/* Grids */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px 14px;}
.vgrid.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;flex-wrap:nowrap;}
.vgrid.row::-webkit-scrollbar{display:none;}
.vgrid.row .vcard{min-width:270px;max-width:270px;}

/* Card */
.vcard{cursor:pointer;transition:transform var(--ease);animation:fu .35s both;position:relative;}
.vcard:hover{transform:translateY(-3px);}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.vthumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:var(--bg3);}
.vthumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.vcard:hover .vthumb img{transform:scale(1.04);}
.vthumb iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:2;}
.vthumb.playing img{display:none;}
.vthumb.playing .vhover{display:none;}
.vhover{position:absolute;inset:0;background:rgba(0,0,0,.1);opacity:0;transition:opacity var(--ease);z-index:1;}
.vcard:hover .vhover{opacity:1;}

/* Action Buttons Overlay */
.v-actions {position:absolute;top:8px;left:8px;display:flex;flex-direction:row;gap:6px;opacity:0;z-index:5;transition:opacity var(--ease);}
.vcard:hover .v-actions{opacity:1;}
.va-btn {background:rgba(0,0,0,.7);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform var(--ease),background var(--ease);color:#fff;}
.va-btn:hover{transform:scale(1.15);background:rgba(0,0,0,.9);}
.va-btn svg{width:16px;height:16px;fill:currentColor;transition:fill var(--ease);}
.va-btn.liked-btn.on {background:rgba(255,78,78,.18);color:var(--like);}
.va-btn.liked-btn.on svg {fill:var(--like);}
/* Ensure liked state remains visible even when not hovering */
.va-btn.liked-btn.on {opacity: 1 !important;}
.vcard .v-actions .va-btn.liked-btn.on {display:flex;}

.vnew-badge{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;pointer-events:none;z-index:5;}
.vinfo{display:flex;gap:10px;padding:10px 2px 0;}
.vav{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:opacity var(--ease);}
.vav:hover{opacity:.75;}
.vtxt{flex:1;min-width:0;}
.vtitle{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--txt);margin-bottom:4px;cursor:pointer;}
.vtitle:hover{color:var(--blue);}
.vch{font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.vch svg{width:12px;height:12px;fill:currentColor;}
.vlabel{font-size:11px;color:var(--like);font-weight:500;display:flex;align-items:center;gap:3px;}
.vlabel svg{width:10px;height:10px;fill:var(--like);}

/* Skeleton */
.skel .vthumb{background:var(--bg3);}
.sl{background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 50%,var(--skel1) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:4px;height:13px;margin:6px 0;}
.sl.s{width:55%;}
.sa{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:2px;background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 50%,var(--skel1) 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.eico{width:64px;height:64px;margin:0 auto 20px;opacity:.3;}
.eico svg{width:64px;height:64px;fill:currentColor;}
.empty h3{font-size:18px;color:var(--txt2);margin-bottom:8px;}
.empty p{font-size:14px;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);color:var(--txt);padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;border:1px solid var(--bg4);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* VIDEO MODAL */
#vmodal{display:none;position:fixed;inset:0;z-index:500;background:var(--modal-bg);align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
#vmodal.open{display:flex;}
#vmodal-inner{background:var(--bg2);border-radius:14px;width:100%;max-width:920px;overflow:hidden;animation:mopen .25s cubic-bezier(.4,0,.2,1);position:relative;border:1px solid var(--border);}
@keyframes mopen{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
#vmodal-close{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background var(--ease);}
#vmodal-close:hover{background:rgba(255,255,255,.2);}
#vmodal-close svg{width:20px;height:20px;fill:currentColor;}
#vmodal-player{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
#vmodal-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
#vmodal-info{padding:18px 22px 22px;direction:rtl;}
#vmodal-title{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:10px;}
#vmodal-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
#vmodal-channel{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);}
#vmodal-ch-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
#vmodal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.mod-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:none;color:var(--txt);border-radius:20px;padding:8px 16px;font-size:13px;font-family:'Rubik',sans-serif;cursor:pointer;transition:background var(--ease),color var(--ease);}
.mod-btn:hover{background:var(--bg4);}
.mod-btn svg{width:16px;height:16px;fill:currentColor;}
.mod-btn.liked{background:rgba(255,78,78,.18);color:var(--like);}
.mod-btn.followed{background:rgba(62,166,255,.15);color:var(--blue);}
#vmodal-divider{height:1px;background:var(--border);margin:12px 0;}
#vmodal-desc{font-size:13px;color:var(--txt2);line-height:1.7;max-height:100px;overflow:hidden;white-space:pre-line;transition:max-height .3s;}
#vmodal-desc.exp{max-height:400px;}
#vmodal-expand{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Rubik',sans-serif;margin-top:6px;padding:0;display:flex;align-items:center;gap:4px;}

/* NOTIFICATIONS */
#notif-panel{position:fixed;top:calc(var(--th) + 8px);left:16px;width:340px;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-height:420px;overflow-y:auto;transform:translateY(-8px);}
#notif-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
.notif-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);}
.notif-hdr h3{font-size:14px;font-weight:600;}
.notif-clear{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Rubik',sans-serif;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;cursor:pointer;transition:background var(--ease);direction:rtl;}
.notif-item:hover{background:var(--bg3);}
.notif-item.unread{border-inline-start:3px solid var(--red);}
.notif-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.notif-body{flex:1;min-width:0;}
.notif-txt{font-size:13px;line-height:1.4;margin-bottom:3px;}
.notif-time{font-size:11px;color:var(--txt3);}
.notif-empty{padding:30px;text-align:center;color:var(--txt3);font-size:13px;line-height:1.6;}

/* CONTEXT MENU */
#ctx-menu {display:none;position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;box-shadow:0 4px 16px var(--shadow);padding:4px 0;min-width:180px;font-size:13px;}
.ctx-item {padding:10px 16px;cursor:pointer;color:var(--txt);transition:background var(--ease);}
.ctx-item:hover {background:var(--bg3);}

@media(max-width:900px){.hero-inner{grid-template-columns:1fr;}.hero-info{display:none;}}
@media(max-width:760px){#sidebar{display:none;}#main{margin-inline-end:0!important;padding:16px 14px;}.vgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}#search-area{max-width:none;}#vmodal-inner{max-width:100%;}#notif-panel{right:8px;left:8px;width:auto;}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
</style>
</head>

<script>
const API_KEY = 'AIzaSyB-SYIw3diw_2RZFY6cfDPHOkzQN9aQ94E';
let vids=[], chMap={}, chIdMap={};
let likes=new Set(JSON.parse(localStorage.getItem('ml')||'[]'));
let followed=new Set(JSON.parse(localStorage.getItem('mf')||'[]'));
let chWatches=JSON.parse(localStorage.getItem('mcw')||'{}');
let watchedVids=JSON.parse(localStorage.getItem('mwatched')||'[]');
let blockedChannels=JSON.parse(localStorage.getItem('mbc')||'[]');
let blockedVids=JSON.parse(localStorage.getItem('mbv')||'[]');

let sbOpen=true, section='all', q='', channelFilter='';
let modalVid=null, heroVid=null, heroPlaying=false;
let notifications=JSON.parse(localStorage.getItem('mn')||'[]');
let chLastVids=JSON.parse(localStorage.getItem('mlv')||'{}');
let searchChannels=[];

const PAL=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#f06595','#74c0fc'];
const HEART_FULL='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z';
const HEART_OUT='M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z';

// Init Theme
let isDark = localStorage.getItem('mytheme') !== 'light';
document.body.className = isDark ? 'dark' : 'light';

window.addEventListener('DOMContentLoaded',()=>{
  searchYouTube('חדשות'); renderNotifs(); updateBadge();
  setInterval(checkNewVids,5*60*1000);
  document.addEventListener('click',e=>{
    const p=document.getElementById('notif-panel'),b=document.getElementById('bell-btn');
    if(p.classList.contains('open')&&!p.contains(e.target)&&!b.contains(e.target))p.classList.remove('open');
    if(!document.getElementById('search-area').contains(e.target))document.getElementById('search-drop').classList.remove('show');
    document.getElementById('ctx-menu').style.display='none';
  });
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
});

function toggleTheme(){
  isDark=!isDark;
  localStorage.setItem('mytheme', isDark ? 'dark' : 'light');
  document.body.className = isDark ? 'dark' : 'light';
}

function addToWatched(vid) {
  if(!vid) return;
  watchedVids = watchedVids.filter(v => v.id !== vid.id);
  watchedVids.unshift(vid);
  if(watchedVids.length > 100) watchedVids = watchedVids.slice(0,100);
  localStorage.setItem('mwatched', JSON.stringify(watchedVids));
}

async function searchYouTube(query='חדשות'){
  showSkels(); searchChannels=[];
  try{
    const r1=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`);
    const d1=await r1.json();
    if(d1.error)throw new Error(d1.error.message);
    vids=d1.items.map(item=>({
      id:item.id.videoId, title:item.snippet.title, channel:item.snippet.channelTitle,
      channelId:item.snippet.channelId,
      thumb:item.snippet.thumbnails.high?.url||item.snippet.thumbnails.medium.url,
      desc:item.snippet.description, publishedAt:item.snippet.publishedAt
    }));
    try{
      const r2=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&type=channel&key=${API_KEY}`);
      const d2=await r2.json();
      if(!d2.error)searchChannels=d2.items.map(item=>({id:item.id.channelId,name:item.snippet.title,desc:item.snippet.description,thumb:item.snippet.thumbnails?.default?.url}));
    }catch(e2){}
    buildChMap(); buildSBChannels(); checkNewVids(); renderAll();
  }catch(e){showErr("שגיאה: "+e.message);}
}

function buildChMap(){
  chMap={}; chIdMap={};
  for(const v of vids){
    if(!v.channel)continue;
    if(!chMap[v.channel])chMap[v.channel]=[];
    chMap[v.channel].push(v.id);
    chIdMap[v.channel] = v.channelId;
  }
}

function recordWatch(ch){if(!ch)return;chWatches[ch]=(chWatches[ch]||0)+1;localStorage.setItem('mcw',JSON.stringify(chWatches));}
function getSortedChannels(){return Object.keys(chMap).sort((a,b)=>(chWatches[b]||0)-(chWatches[a]||0));}

// HERO
function renderHero(){
  const heroEl=document.getElementById('hero');
  if(section!=='all'||q||channelFilter){heroEl.style.display='none';return;}
  const v=getRec().map(id=>vids.find(vv=>vv.id===id)).filter(v => v && !blockedVids.includes(v.id) && !blockedChannels.includes(v.channel)).find(Boolean);
  if(!v){heroEl.style.display='none';return;}
  heroVid=v; heroPlaying=false;
  document.getElementById('hero-thumb').src=v.thumb;
  document.getElementById('hero-title').textContent=v.title;
  document.getElementById('hero-ch-name').textContent=v.channel;
  document.getElementById('hero-desc').textContent=v.desc||'';
  const col=PAL[Math.abs(hsh(v.channel||''))%PAL.length];
  const av=document.getElementById('hero-ch-av');
  av.style.background=col+'22';av.style.color=col;av.textContent=(v.channel||'?').slice(0,2).toUpperCase();
  const wrap=document.getElementById('hero-player-wrap');
  wrap.classList.remove('hero-playing'); wrap.querySelector('iframe')?.remove();
  updateHeroLike(); updateHeroFollow();
  heroEl.style.display='block';
}
function heroPlay(){if(!heroVid||heroPlaying)return;heroPlaying=true;recordWatch(heroVid.channel);addToWatched(heroVid);const wrap=document.getElementById('hero-player-wrap');wrap.classList.add('hero-playing');const iframe=document.createElement('iframe');iframe.src=`https://www.youtube.com/embed/${heroVid.id}?autoplay=1&rel=0`;iframe.allow='autoplay; encrypted-media';iframe.allowFullscreen=true;wrap.appendChild(iframe);}
function heroToggleLike(){if(!heroVid)return;likes.has(heroVid.id)?likes.delete(heroVid.id):likes.add(heroVid.id);localStorage.setItem('ml',JSON.stringify([...likes]));updateHeroLike();setTimeout(renderAll,80);}
function heroToggleFollow(){if(heroVid?.channel){toggleFollow(heroVid.channel);updateHeroFollow();}}
function updateHeroLike(){if(!heroVid)return;const liked=likes.has(heroVid.id);document.getElementById('hero-like-btn').classList.toggle('liked',liked);document.getElementById('hero-heart').setAttribute('d',liked?HEART_FULL:HEART_OUT);document.getElementById('hero-like-txt').textContent=liked?'הסר מאהבתי':'אהבתי';}
function updateHeroFollow(){if(!heroVid)return;const isF=followed.has(heroVid.channel);document.getElementById('hero-follow-btn').classList.toggle('followed',isF);document.getElementById('hero-follow-txt').textContent=isF?'מפסיק לעקוב':'עקוב';}

function toggleFollow(ch){
  if(followed.has(ch)){followed.delete(ch);toast('הפסקת לעקוב אחרי '+ch);}
  else{followed.add(ch);toast('עוקב עכשיו אחרי '+ch);if(chMap[ch]&&!chLastVids[ch]){chLastVids[ch]=[...chMap[ch]];localStorage.setItem('mlv',JSON.stringify(chLastVids));}}
  localStorage.setItem('mf',JSON.stringify([...followed]));
  buildSBChannels();renderAll();if(modalVid)updateModalFollow();
}

function checkNewVids(){
  let found=0;
  for(const ch of followed){
    if(blockedChannels.includes(ch)) continue;
    const cur=chMap[ch]||[],last=chLastVids[ch]||[],newIds=cur.filter(id=>!last.includes(id) && !blockedVids.includes(id));
    for(const id of newIds){const v=vids.find(x=>x.id===id);addNotif(ch,v?(v.title||'סרטון חדש'):'סרטון חדש',id);found++;}
    if(newIds.length)chLastVids[ch]=[...cur];
  }
  if(found){localStorage.setItem('mlv',JSON.stringify(chLastVids));renderNotifs();updateBadge();}
}
function getNewVidIds(){const r=[];for(const ch of followed){if(blockedChannels.includes(ch)) continue; const cur=chMap[ch]||[],last=chLastVids[ch]||[];cur.filter(id=>!last.includes(id) && !blockedVids.includes(id)).forEach(id=>r.push(id));}return r;}
function addNotif(ch,title,vidId){notifications.unshift({id:Date.now()+Math.random(),channel:ch,title,vidId,time:new Date().toISOString(),read:false});if(notifications.length>50)notifications=notifications.slice(0,50);localStorage.setItem('mn',JSON.stringify(notifications));}
function renderNotifs(){const list=document.getElementById('notif-list');if(!list)return;list.innerHTML='';if(!notifications.length){list.innerHTML='<div class="notif-empty">אין התראות עדיין<br><br>עקוב אחרי ערוץ לקבלת התראות.</div>';return;}for(const n of notifications){const col=PAL[Math.abs(hsh(n.channel||''))%PAL.length];const el=document.createElement('div');el.className='notif-item'+(n.read?'':' unread');el.innerHTML=`<div class="notif-av" style="background:${col}22;color:${col}">${(n.channel||'?').slice(0,2).toUpperCase()}</div><div class="notif-body"><div class="notif-txt"><strong>${x(n.channel)}</strong>: ${x(n.title)}</div><div class="notif-time">${fmtTime(n.time)}</div></div>`;el.onclick=()=>{n.read=true;localStorage.setItem('mn',JSON.stringify(notifications));updateBadge();renderNotifs();const v=vids.find(vv=>vv.id===n.vidId);if(v){document.getElementById('notif-panel').classList.remove('open');openModal(v);}};list.appendChild(el);}}
function clearNotifs(){notifications.forEach(n=>n.read=true);localStorage.setItem('mn',JSON.stringify(notifications));updateBadge();renderNotifs();}
function updateBadge(){const b=document.getElementById('notif-badge');if(!b)return;const u=notifications.filter(n=>!n.read).length;b.textContent=u>9?'9+':u;b.classList.toggle('vis',u>0);}
function toggleNotifPanel(){document.getElementById('notif-panel').classList.toggle('open');}
function fmtTime(iso){if(!iso)return'';const d=Date.now()-new Date(iso).getTime();if(d<60000)return'עכשיו';if(d<3600000)return`לפני ${Math.floor(d/60000)} דק'`;if(d<86400000)return`לפני ${Math.floor(d/3600000)} שע'`;return`לפני ${Math.floor(d/86400000)} ימים`;}

async function fetchDesc(v){try{const r=await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${v.id}`);if(r.ok){const d=await r.json();if(d.description)return d.description;}}catch{}return`סרטון מאת ${v.channel||'ערוץ YouTube'}.`;}

// Context Menu Handlers
function showCtx(e, type, vId, chName) {
  e.preventDefault(); e.stopPropagation();
  const ctx = document.getElementById('ctx-menu');
  ctx.style.display = 'block';
  ctx.style.left = Math.min(e.pageX, window.innerWidth - 200) + 'px';
  ctx.style.top = e.pageY + 'px';
  if(type === 'video') {
    ctx.innerHTML = `<div class="ctx-item" onclick="blockVid('${vId}')">אל תציג יותר סרטון זה</div><div class="ctx-item" onclick="blockChannel('${x(chName)}')">אל תציג תכנים מערוץ זה</div>`;
  } else if(type === 'channel') {
    ctx.innerHTML = `<div class="ctx-item" onclick="blockChannel('${x(chName)}')">אל תציג תכנים מערוץ זה</div>`;
  }
}

function blockVid(id) {
  if(!blockedVids.includes(id)) blockedVids.push(id);
  localStorage.setItem('mbv', JSON.stringify(blockedVids));
  toast('הסרטון הוסתר.');
  document.getElementById('ctx-menu').style.display='none';
  renderAll();
}

function blockChannel(ch) {
  if(!blockedChannels.includes(ch)) blockedChannels.push(ch);
  localStorage.setItem('mbc', JSON.stringify(blockedChannels));
  toast('הערוץ הוסתר.');
  document.getElementById('ctx-menu').style.display='none';
  if(channelFilter === ch) setSection('all', document.getElementById('n-all'));
  else { buildSBChannels(); renderAll(); }
}

// Inline play in card
function playInCard(v,thumbEl){
  if(thumbEl.classList.contains('playing'))return;
  thumbEl.classList.add('playing');
  const iframe=document.createElement('iframe');
  iframe.src=`https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0`;
  iframe.allow='autoplay; encrypted-media';iframe.allowFullscreen=true;
  thumbEl.appendChild(iframe);
  recordWatch(v.channel);
  addToWatched(v);
}

function getRec(){
  const sorted=getSortedChannels();
  const picks=[];
  for(const ch of sorted)for(const id of(chMap[ch]||[]))if(!picks.includes(id))picks.push(id);
  for(const v of vids)if(!picks.includes(v.id))picks.push(v.id);
  return picks;
}

function playAllLiked() {
  const lv=vids.filter(v=>likes.has(v.id) && !blockedVids.includes(v.id) && !blockedChannels.includes(v.channel));
  if(lv.length) {
    const ids = lv.map(v => v.id).join(',');
    window.open(`https://www.youtube.com/watch_videos?video_ids=${ids}`, '_blank');
  }
}

async function renderChannelPage(ct){
  const ch=channelFilter,col=PAL[Math.abs(hsh(ch))%PAL.length],isF=followed.has(ch);
  const cv=(chMap[ch]||[]).map(id=>vids.find(v=>v.id===id)).filter(v=>v&&!blockedVids.includes(v.id));
  const hdr=document.createElement('div');hdr.className='ch-page-hdr';
  hdr.innerHTML=`<div class="ch-page-av" style="background:${col}22;color:${col}">${ch.slice(0,2).toUpperCase()}</div><div style="flex:1"><div class="ch-page-name">${x(ch)}</div><div class="ch-page-sub">${cv.length} סרטונים זמינים</div></div><button class="ch-follow-btn${isF?' following':''}" id="ch-follow-top" onclick="toggleFollow('${x(ch)}');renderAll()">${isF?'מפסיק לעקוב':'עקוב'}</button>`;
  ct.appendChild(hdr);

  // Load Playlists
  const chId = chIdMap[ch];
  if(chId) {
    const plContainer = document.createElement('div');
    ct.appendChild(plContainer);
    fetchPlaylists(chId, plContainer);

  else ct.appendChild(mkEmpty('אין סרטונים מהערוץ הזה',''));

async function fetchPlaylists(chId, container) {
  try {
    const r = await fetch(`https://www.googleapis.com/youtube/v3/playlists?part=snippet&maxResults=10&channelId=${chId}&key=${API_KEY}`);
    const d = await r.json();
    if(d.items && d.items.length) {
      const sec = document.createElement('div');
      sec.className = 'section';
      sec.innerHTML = `<div class="sec-hdr"><div class="sec-title"><div class="sec-ico" style="background:#74c0fc22;color:#74c0fc"><svg viewBox="0 0 24 24"><path d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z"/></svg></div>פלייליסטים</div></div><div class="vgrid row"></div>`;
      const grid = sec.querySelector('.vgrid');
      d.items.forEach((item, i) => {
         const plThumb = item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url;
         const el = document.createElement('div');
         el.className = 'vcard'; el.style.animationDelay = (i*25)+'ms';
         el.innerHTML = `<div class="vthumb"><img src="${plThumb}" alt=""><div class="vhover"><div class="pcircle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div></div><div class="vinfo"><div class="vtxt"><div class="vtitle">${x(item.snippet.title)}</div><div class="vch">פלייליסט</div></div></div>`;
         el.onclick = () => window.open(`https://www.youtube.com/playlist?list=${item.id}`, '_blank');
         grid.appendChild(el);
      });
      container.appendChild(sec);
    }
  } catch(e){}
}

function renderSearch(ct){
  const visibleChs = searchChannels.filter(ch => !blockedChannels.includes(ch.name));
  if(visibleChs.length){
    const sec=document.createElement('div');sec.className='section';
    const hdr=document.createElement('div');hdr.className='sec-hdr';
    hdr.innerHTML=`<div class="sec-title"><div class="sec-ico" style="background:#4d96ff22;color:#4d96ff"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></div>ערוצים</div>`;
    sec.appendChild(hdr);

      el.innerHTML=`<div class="ch-result-av" style="background:${col}22;color:${col}">${(ch.name||'?').slice(0,2).toUpperCase()}</div><div style="flex:1"><div class="ch-result-name">${x(ch.name)}</div><div class="ch-result-sub">${x((ch.desc||'').slice(0,80))}</div><div class="ch-result-tag">ערוץ YouTube</div></div><button class="ch-follow-btn${isF?' following':''}" onclick="event.stopPropagation();toggleFollow('${x(ch.name)}');renderAll()">${isF?'מפסיק לעקוב':'עקוב'}</button>`;

  if(filt.length)ct.appendChild(mkSec(`תוצאות: "${q}"`,filt,'<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>','#aaa',false));
  else if(!visibleChs.length)ct.appendChild(mkEmpty('לא נמצאו תוצאות','נסה מילת חיפוש אחרת'));
}

function mkSec(title,vs,icoPath,color,scrollable,badge,newIds=[]){
  const s=document.createElement('div');s.className='section';
  const hdr=document.createElement('div');hdr.className='sec-hdr';
  const newCount=newIds.length?vs.filter(v=>newIds.includes(v.id)).length:0;
  hdr.innerHTML=`<div class="sec-title"><div class="sec-ico" style="background:${color}22;color:${color}"><svg viewBox="0 0 24 24">${icoPath}</svg></div>${x(title)}${badge?`<span class="sec-badge">${x(badge)}</span>`:''}${newCount>0?`<span class="sec-new-badge">+${newCount} חדש</span>`:''}</div><span class="sec-count">${vs.length} סרטונים</span>`;
  s.appendChild(hdr);
  const g=document.createElement('div');g.className='vgrid'+(scrollable?' row':'');
  vs.forEach((v,i)=>g.appendChild(mkCard(v,i*25,newIds.includes(v.id))));
  s.appendChild(g);return s;
}

         <button class="va-btn play-inline" title="הפעל כאן"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
         <button class="va-btn modal-btn" title="פתח בחלונית"><svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg></button>
         <button class="va-btn ext-btn" title="פתח ביוטיוב"><svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg></button>
         <button class="va-btn liked-btn${liked?' on':''}" data-id="${v.id}" title="אהבתי"><svg viewBox="0 0 24 24"><path d="${liked?HEART_FULL:HEART_OUT}"/></svg></button>
      </div>
      ${isNew?'<div class="vnew-badge">חדש</div>':''}
    </div>
    <div class="vinfo">
      <div class="vav" style="background:${col}22;color:${col}">${init}</div>
      <div class="vtxt">
        <div class="vtitle">${x(v.title)}</div>
        <div class="vch"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>${x(v.channel)}</div>
        ${liked?`<div class="vlabel"><svg viewBox="0 0 24 24"><path d="${HEART_FULL}"/></svg>אהבתי</div>`:''}
      </div>
    </div>`;

  const thumbEl=el.querySelector('.vthumb');
  el.querySelector('.play-inline').addEventListener('click',e=>{e.stopPropagation();playInCard(v,thumbEl);});
  el.querySelector('.modal-btn').addEventListener('click',e=>{e.stopPropagation();openModal(v);});
  el.querySelector('.ext-btn').addEventListener('click',e=>{e.stopPropagation();openYT(v);});
  el.querySelector('.liked-btn').addEventListener('click',e=>{e.stopPropagation();toggleLike(v.id,el.querySelector('.liked-btn'));});

  el.querySelector('.vtitle').addEventListener('click',()=>openModal(v));
  el.querySelector('.vav').addEventListener('click',e=>{e.stopPropagation();filterChannel(v.channel);});

  // Context Menu
  el.oncontextmenu = (e) => showCtx(e, 'video', v.id, v.channel);

  return el;
}

function filterChannel(ch){channelFilter=ch;q='';document.getElementById('search-input').value='';document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));buildSBChannels();renderAll();}
function mkEmpty(t,s){const d=document.createElement('div');d.className='empty';d.innerHTML=`<div class="eico"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg></div><h3>${x(t)}</h3><p>${x(s)}</p>`;return d;}
function showSkels(){const ct=document.getElementById('content');ct.innerHTML='';document.getElementById('hero').style.display='none';const g=document.createElement('div');g.className='vgrid';for(let i=0;i<12;i++)g.appendChild(mkCard({id:'_'+i,title:null},i*25));ct.appendChild(g);}
function showErr(msg){document.getElementById('content').innerHTML=`<div class="empty"><div class="eico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div><h3>שגיאה בטעינה</h3><p>${x(msg)}</p></div>`;}

// Sidebar
function buildSBChannels(){
  const w=document.getElementById('sb-chs');w.innerHTML='';
  const arr=[...followed].filter(ch => !blockedChannels.includes(ch));
  if(!arr.length){const e=document.createElement('div');e.className='sb-empty';e.textContent='עוד לא עוקב';w.appendChild(e);return;}
  arr.forEach(ch=>{
    const c=PAL[Math.abs(hsh(ch))%PAL.length];
    const hasNew=notifications.some(n=>!n.read&&n.channel===ch);
    const el=document.createElement('div');el.className='chitem'+(channelFilter===ch?' active':'');
    el.innerHTML=`<div class="chdot${hasNew?' hn':''}" style="background:${c}22;color:${c}">${ch.slice(0,2).toUpperCase()}<span class="ndot"></span></div><span class="chname">${x(ch)}</span>`;
    el.onclick=()=>filterChannel(ch);
    el.oncontextmenu=(e)=>showCtx(e, 'channel', null, ch);
    w.appendChild(el);
  });
}

function toggleLike(id,btn){likes.has(id)?likes.delete(id):likes.add(id);btn.classList.toggle('on',likes.has(id));btn.querySelector('path').setAttribute('d',likes.has(id)?HEART_FULL:HEART_OUT);toast(likes.has(id)?'נוסף לאהבתי':'הוסר מאהבתי');localStorage.setItem('ml',JSON.stringify([...likes]));if(modalVid&&modalVid.id===id)updateModalLike();setTimeout(renderAll,80);}
function setSection(sec,el){section=sec;channelFilter='';q='';document.getElementById('search-input').value='';document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));el.classList.add('on');syncChips(sec);renderAll();}
function chip(btn,sec){section=sec;channelFilter='';q='';document.getElementById('search-input').value='';document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));const n=document.getElementById('n-'+sec);if(n)n.classList.add('on');renderAll();}
function syncChips(sec){document.querySelectorAll('.chip').forEach(c=>{c.classList.toggle('on',(c.getAttribute('onclick')||'').includes(`'${sec}'`));});}
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('col',!sbOpen);document.getElementById('main').classList.toggle('col',!sbOpen);}
function goHome(e){e.preventDefault();section='all';channelFilter='';q='';document.getElementById('search-input').value='';document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));document.querySelector('.chip').classList.add('on');document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));document.getElementById('n-all').classList.add('on');renderAll();}

let searchTimer;
function onSearchInput(v){
  q=v.trim();clearTimeout(searchTimer);
  const drop=document.getElementById('search-drop');
  if(!q){drop.classList.remove('show');if(!channelFilter)renderAll();return;}
  const matches=[...new Set(vids.filter(vid=>!blockedChannels.includes(vid.channel) && (vid.channel||'').toLowerCase().includes(q.toLowerCase())).map(v=>v.channel))].slice(0,5);
  if(matches.length){drop.innerHTML='<div class="sdrop-label">ערוצים</div>'+matches.map(ch=>`<div class="sdrop-item" onclick="filterChannel('${x(ch)}');document.getElementById('search-drop').classList.remove('show')"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>${x(ch)}</div>`).join('');drop.classList.add('show');}
  else drop.classList.remove('show');
  searchTimer=setTimeout(()=>{if(q.length>2)doSearch();},1500);
}
function doSearch(){const v=document.getElementById('search-input').value.trim();if(!v)return;q=v;channelFilter='';document.getElementById('search-drop').classList.remove('show');searchYouTube(v);}
function reload(){vids=[];chMap={};section='all';channelFilter='';q='';showSkels();searchYouTube();toast('מרענן...');}
function hsh(s){let r=0;for(let i=0;i<s.length;i++)r=((r<<5)-r)+s.charCodeAt(i)|0;return r;}
function x(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _t;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),2600);}
</script>
</body>
</html>

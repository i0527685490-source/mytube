<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body.light {
  --bg:#ffffff; --bg2:#f9f9f9; --bg3:#f1f1f1; --bg4:#e0e0e0;
  --txt:#0f0f0f; --txt2:#555; --txt3:#888;
  --skel1:#e8e8e8; --skel2:#d0d0d0;
  --border:rgba(0,0,0,0.08); --shadow:rgba(0,0,0,0.12);
  --modal-bg:rgba(0,0,0,0.7);
}
body.dark {
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#272727; --bg4:#3f3f3f;
  --txt:#f1f1f1; --txt2:#aaa; --txt3:#717171;
  --skel1:#272727; --skel2:#3f3f3f;
  --border:rgba(255,255,255,0.08); --shadow:rgba(0,0,0,0.5);
  --modal-bg:rgba(0,0,0,0.88);
}
:root{--red:#ff0000;--red2:#cc0000;--blue:#3ea6ff;--like:#ff4e4e;--sw:240px;--sc:72px;--th:56px;--ease:0.2s cubic-bezier(0.4,0,0.2,1);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Rubik',sans-serif;overflow-x:hidden;min-height:100vh;transition:background .2s,color .2s;}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--th);background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200;border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.tbtn{background:none;border:none;cursor:pointer;color:var(--txt);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--ease);}
.tbtn:hover{background:var(--bg3);}
.tbtn svg{width:22px;height:22px;fill:currentColor;}
#logo{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0;}
.logo-badge{background:var(--red);border-radius:8px;width:34px;height:24px;display:flex;align-items:center;justify-content:center;transition:transform var(--ease),box-shadow var(--ease);}
#logo:hover .logo-badge{transform:scale(1.08);box-shadow:0 0 16px rgba(255,0,0,.4);}
.logo-badge svg{width:15px;height:15px;fill:#fff;}
.logo-txt{font-size:17px;font-weight:700;letter-spacing:-.5px;color:var(--txt);}
.logo-txt span{color:var(--red);}
#search-area{flex:1;max-width:540px;display:flex;align-items:center;margin:0 auto;direction:ltr;position:relative;}
#search-input{flex:1;background:var(--bg2);border:1.5px solid var(--bg4);border-right:none;border-radius:24px 0 0 24px;padding:8px 16px;color:var(--txt);font-size:14px;font-family:'Rubik',sans-serif;outline:none;direction:rtl;transition:border-color var(--ease),background var(--ease);}
#search-input:focus{border-color:var(--blue);background:var(--bg3);}
#search-input::placeholder{color:var(--txt3);}
#search-btn{background:var(--bg3);border:1.5px solid var(--bg4);border-left:none;border-radius:0 24px 24px 0;padding:0 18px;height:38px;cursor:pointer;color:var(--txt);display:flex;align-items:center;transition:background var(--ease);}
#search-btn:hover{background:var(--bg4);}
#search-btn svg{width:18px;height:18px;fill:currentColor;}
#search-drop{position:absolute;top:44px;right:0;left:0;background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;box-shadow:0 8px 24px var(--shadow);z-index:300;display:none;overflow:hidden;max-height:300px;overflow-y:auto;}
#search-drop.show{display:block;}
.sdrop-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background var(--ease);direction:rtl;font-size:13px;}
.sdrop-item:hover{background:var(--bg3);}
.sdrop-item svg{width:16px;height:16px;fill:var(--txt3);flex-shrink:0;}
.sdrop-label{font-size:10px;color:var(--txt3);font-weight:600;padding:6px 16px 2px;text-transform:uppercase;letter-spacing:.5px;}
.tb-r{display:flex;align-items:center;gap:6px;margin-inline-start:auto;flex-shrink:0;}

/* QUOTA PILL */
.quota-pill{background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--txt2);display:flex;align-items:center;gap:5px;cursor:help;white-space:nowrap;flex-shrink:0;position:relative;}
.quota-pill.low{color:#ff9800;border-color:#ff9800;}
.quota-pill.crit{color:#ff4444;border-color:#ff4444;}
.quota-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0;}
.quota-pill.low .quota-dot{background:#ff9800;}
.quota-pill.crit .quota-dot{background:#ff4444;}

/* YOUTUBE LOGIN */
.yt-login-btn{background:var(--red);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif;display:flex;align-items:center;gap:6px;transition:background var(--ease);flex-shrink:0;}
.yt-login-btn:hover{background:var(--red2);}
.yt-login-btn svg{width:14px;height:14px;fill:currentColor;}
.yt-user-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:3px 10px 3px 3px;cursor:pointer;transition:background var(--ease);}
.yt-user-chip:hover{background:var(--bg4);}
.yt-user-av{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.yt-user-av.init{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.yt-user-name{font-size:12px;font-weight:500;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* YT CONNECT PANEL */
#yt-panel{position:fixed;top:calc(var(--th)+8px);left:12px;width:280px;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:300;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(-8px);direction:rtl;}
#yt-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
#yt-panel h4{font-size:14px;font-weight:600;margin-bottom:10px;}
#yt-panel input{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:13px;font-family:'Rubik',sans-serif;outline:none;margin-bottom:8px;}
#yt-panel input:focus{border-color:var(--blue);}
#yt-panel p{font-size:11px;color:var(--txt3);margin-bottom:10px;line-height:1.5;}
.ytpanel-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px;font-size:13px;font-family:'Rubik',sans-serif;cursor:pointer;font-weight:600;transition:background var(--ease);margin-bottom:6px;}
.ytpanel-btn:hover{background:var(--red2);}
.ytpanel-dis{width:100%;background:var(--bg3);color:var(--txt2);border:1px solid var(--bg4);border-radius:8px;padding:6px;font-size:12px;font-family:'Rubik',sans-serif;cursor:pointer;display:none;}
#yt-panel .ytpanel-dis.vis{display:block;}

/* BACK BUTTON */
.back-btn{display:none;align-items:center;gap:6px;background:var(--bg3);border:none;color:var(--txt);cursor:pointer;border-radius:20px;padding:7px 14px;font-size:13px;font-family:'Rubik',sans-serif;margin-bottom:16px;transition:background var(--ease);}
.back-btn.show{display:flex;}
.back-btn:hover{background:var(--bg4);}
.back-btn svg{width:18px;height:18px;fill:currentColor;}

/* SIDEBAR */
#sidebar{position:fixed;top:var(--th);right:0;width:var(--sw);height:calc(100vh - var(--th));background:var(--bg);overflow-y:auto;overflow-x:hidden;padding:8px 0 24px;z-index:100;transition:width var(--ease);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
#sidebar.col{width:var(--sc);}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
.sb-div{height:1px;background:var(--border);margin:8px 0;}
.sb-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:8px 20px 4px;white-space:nowrap;overflow:hidden;transition:opacity var(--ease),height var(--ease),padding var(--ease);height:28px;}
#sidebar.col .sb-label{opacity:0;height:0;padding:0;}
.nitem{display:flex;align-items:center;height:40px;padding:0 20px;gap:20px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);text-decoration:none;color:var(--txt);white-space:nowrap;overflow:hidden;}
.nitem:hover{background:var(--bg3);}
.nitem.on{background:var(--bg3);}
.nitem.on .ni{color:var(--red);}
.ni{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ni svg{width:22px;height:22px;fill:currentColor;}
.nl{font-size:13px;}
#sidebar.col .nl{display:none;}
#sidebar.col .nitem{padding:0;justify-content:center;gap:0;}
.chitem{display:flex;align-items:center;gap:10px;height:40px;padding:0 12px 0 8px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);color:var(--txt);white-space:nowrap;overflow:hidden;}
.chitem:hover{background:var(--bg3);}
.chitem.active{background:var(--bg3);}
.chdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;}
.chdot .ndot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none;z-index:2;}
.chdot.hn .ndot{display:block;}
.chdot img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.chname{font-size:13px;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
#sidebar.col .chitem{padding:0;justify-content:center;gap:0;}
#sidebar.col .chname{display:none;}
.sb-empty{padding:8px 20px;font-size:12px;color:var(--txt3);line-height:1.5;}

/* MAIN */
#main{margin-top:var(--th);margin-right:var(--sw);padding:20px 28px;transition:margin-right var(--ease);min-height:calc(100vh - var(--th));}
#main.col{margin-right:var(--sc);}

/* Chips */
#chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:none;direction:ltr;}
#chips::-webkit-scrollbar{display:none;}
.chip{background:var(--bg3);color:var(--txt);border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Rubik',sans-serif;transition:background var(--ease),transform .1s;}
.chip:hover{background:var(--bg4);transform:translateY(-1px);}
.chip.on{background:var(--txt);color:var(--bg);}

/* HERO */
#hero{margin-bottom:32px;display:none;}
#hero.show{display:block;}
.hero-inner{display:grid;grid-template-columns:1fr 320px;background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 40px var(--shadow);}
.hero-player-wrap{position:relative;aspect-ratio:16/9;background:#000;cursor:pointer;}
.hero-player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.hero-thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);transition:background var(--ease);}
.hero-player-wrap:hover .hero-play-btn{background:rgba(0,0,0,.15);}
.hero-play-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,0,0,.9);display:flex;align-items:center;justify-content:center;transition:transform var(--ease),box-shadow var(--ease);}
.hero-player-wrap:hover .hero-play-circle{transform:scale(1.12);box-shadow:0 0 32px rgba(255,0,0,.5);}
.hero-play-circle svg{width:28px;height:28px;fill:#fff;margin-inline-start:4px;}
.hero-playing .hero-thumb,.hero-playing .hero-play-btn{display:none;}
.hero-info{padding:22px 18px;display:flex;flex-direction:column;direction:rtl;overflow:hidden;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,0,.12);border:1px solid rgba(255,0,0,.2);color:var(--red);font-size:11px;font-weight:600;border-radius:20px;padding:4px 10px;margin-bottom:10px;width:fit-content;}
.hero-title{font-size:16px;font-weight:600;line-height:1.4;color:var(--txt);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-ch{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.hero-ch-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
.hero-ch-av img{width:100%;height:100%;object-fit:cover;}
.hero-ch-name{font-size:13px;color:var(--txt2);}
.hero-desc{font-size:12px;color:var(--txt3);line-height:1.6;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.hero-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.hero-btn{display:flex;align-items:center;gap:6px;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-family:'Rubik',sans-serif;cursor:pointer;font-weight:500;transition:all var(--ease);}
.hero-btn.primary{background:var(--red);color:#fff;}
.hero-btn.primary:hover{background:var(--red2);}
.hero-btn.secondary{background:var(--bg3);color:var(--txt);}
.hero-btn.secondary:hover{background:var(--bg4);}
.hero-btn svg{width:15px;height:15px;fill:currentColor;}
.hero-btn.liked{background:rgba(255,78,78,.18);color:var(--like);}
.hero-btn.followed{background:rgba(62,166,255,.15);color:var(--blue);}

/* New videos banner */
.new-vids-banner{background:linear-gradient(135deg,rgba(255,0,0,.08),rgba(255,0,0,.03));border:1px solid rgba(255,0,0,.15);border-radius:10px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt2);}
.new-vids-banner svg{width:16px;height:16px;fill:var(--red);flex-shrink:0;}

/* Fetch indicator */
.fetch-indicator{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt3);padding:6px 0 14px;animation:pulse 1.4s infinite;}
.fetch-indicator svg{width:14px;height:14px;fill:var(--txt3);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* FEATURED VIDEO (Graduated layout) */
.featured-vid{margin-bottom:24px;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:16/9;background:var(--bg3);}
.featured-vid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.featured-vid:hover img{transform:scale(1.02);}
.featured-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.85));display:flex;flex-direction:column;justify-content:flex-end;padding:24px;}
.featured-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:3px 8px;width:fit-content;margin-bottom:10px;}
.featured-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.3;}
.featured-meta{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.8);}
.featured-av{width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.featured-av img{width:100%;height:100%;object-fit:cover;}
.featured-date{font-size:11px;color:rgba(255,255,255,.65);}
.featured-play-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--ease);}
.featured-vid:hover .featured-play-hint{opacity:1;}
.fpc{width:72px;height:72px;border-radius:50%;background:rgba(220,0,0,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(0,0,0,.5);}
.fpc svg{width:32px;height:32px;fill:#fff;margin-inline-start:4px;}

/* GRADUATED GRIDS */
.vgrid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.vgrid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:900px){.vgrid-2{grid-template-columns:1fr;}.vgrid-3{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.vgrid-3{grid-template-columns:1fr;}}

/* CHANNEL PAGE */
.ch-page-hdr{display:flex;align-items:center;gap:14px;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:0;}
.ch-page-av{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;overflow:hidden;flex-shrink:0;}
.ch-page-av img{width:100%;height:100%;object-fit:cover;}
.ch-page-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.ch-page-sub{font-size:13px;color:var(--txt3);}
.ch-follow-btn{background:var(--red);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px;font-family:'Rubik',sans-serif;cursor:pointer;font-weight:600;transition:background var(--ease);}
.ch-follow-btn:hover{background:var(--red2);}
.ch-follow-btn.following{background:var(--bg3);color:var(--txt);}
.ch-follow-btn.following:hover{background:var(--bg4);}

/* CHANNEL TABS */
.ch-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);margin-top:16px;}
.ch-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--txt2);cursor:pointer;padding:10px 18px;font-size:14px;font-family:'Rubik',sans-serif;font-weight:500;transition:all var(--ease);margin-bottom:-1px;}
.ch-tab:hover{color:var(--txt);}
.ch-tab.on{color:var(--txt);border-bottom-color:var(--red);font-weight:600;}

/* Channel search result */
.ch-result{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ch-result-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;overflow:hidden;}
.ch-result-av img{width:100%;height:100%;object-fit:cover;}
.ch-result-name{font-size:16px;font-weight:600;transition:color var(--ease);}
.ch-result:hover .ch-result-name{color:var(--blue);}
.ch-result-sub{font-size:12px;color:var(--txt3);margin-top:2px;}
.ch-result-tag{font-size:10px;font-weight:600;background:rgba(62,166,255,.15);color:var(--blue);border-radius:4px;padding:2px 7px;margin-top:4px;width:fit-content;}

/* Sections */
.section{margin-bottom:40px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-size:16px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sec-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.sec-ico svg{width:14px;height:14px;fill:currentColor;}
.sec-badge{font-size:10px;font-weight:600;background:rgba(62,166,255,.15);color:var(--blue);border-radius:10px;padding:2px 8px;}
.sec-new-badge{font-size:10px;font-weight:600;background:rgba(255,0,0,.18);color:var(--red);border-radius:10px;padding:2px 8px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.sec-count{font-size:13px;color:var(--txt3);}
.play-all-btn{background:var(--txt);color:var(--bg);border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Rubik',sans-serif;display:flex;align-items:center;gap:6px;transition:opacity var(--ease);}
.play-all-btn:hover{opacity:0.8;}
.play-all-btn svg{width:14px;height:14px;fill:currentColor;}

/* Grids */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px 14px;}
.vgrid.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;flex-wrap:nowrap;}
.vgrid.row::-webkit-scrollbar{display:none;}
.vgrid.row .vcard{min-width:270px;max-width:270px;}

/* Card */
.vcard{cursor:pointer;transition:transform var(--ease);animation:fu .35s both;position:relative;}
.vcard:hover{transform:translateY(-3px);}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.vthumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:var(--bg3);}
.vthumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.vcard:hover .vthumb img{transform:scale(1.04);}
.vthumb iframe{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:2;}
.vhover{position:absolute;inset:0;background:rgba(0,0,0,.1);opacity:0;transition:opacity var(--ease);z-index:1;}
.vcard:hover .vhover{opacity:1;}

/* Action Buttons Overlay */
.v-actions{position:absolute;top:8px;left:8px;display:flex;flex-direction:row;gap:5px;opacity:0;z-index:5;transition:opacity var(--ease);}
.vcard:hover .v-actions{opacity:1;}
.va-btn{background:rgba(0,0,0,.72);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform var(--ease),background var(--ease);color:#fff;flex-shrink:0;}
.va-btn:hover{transform:scale(1.15);background:rgba(0,0,0,.9);}
.va-btn svg{width:15px;height:15px;fill:currentColor;}
.va-btn.liked-btn.on{background:rgba(255,78,78,.85);}
.va-btn.liked-btn.on svg{fill:#fff;}

/* Liked badge */
.liked-corner{position:absolute;bottom:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(255,78,78,.9);display:none;align-items:center;justify-content:center;z-index:5;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.liked-corner svg{width:13px;height:13px;fill:#fff;}
.vcard.is-liked .liked-corner{display:flex;}
.vcard.is-liked .v-actions{opacity:1;}
.vcard.is-liked .v-actions .va-btn:not(.liked-btn){opacity:0;pointer-events:none;}
.vcard.is-liked:hover .v-actions .va-btn{opacity:1;pointer-events:auto;}

.vnew-badge{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;pointer-events:none;z-index:5;}
.vinfo{display:flex;gap:10px;padding:10px 2px 0;}
.vav{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:opacity var(--ease);overflow:hidden;}
.vav:hover{opacity:.75;}
.vav img{width:100%;height:100%;object-fit:cover;}
.vtxt{flex:1;min-width:0;}
.vtitle{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--txt);margin-bottom:4px;cursor:pointer;}
.vtitle:hover{color:var(--blue);}
.vch{font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.vch svg{width:12px;height:12px;fill:currentColor;}
.vdate{font-size:11px;color:var(--txt3);margin-top:1px;}
.vlabel{font-size:11px;color:var(--like);font-weight:500;display:flex;align-items:center;gap:3px;}
.vlabel svg{width:10px;height:10px;fill:var(--like);}

/* Skeleton */
.skel .vthumb{background:var(--bg3);}
.sl{background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 50%,var(--skel1) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:4px;height:13px;margin:6px 0;}
.sl.s{width:55%;}
.sa{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:2px;background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 50%,var(--skel1) 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.eico{width:64px;height:64px;margin:0 auto 20px;opacity:.3;}
.eico svg{width:64px;height:64px;fill:currentColor;}
.empty h3{font-size:18px;color:var(--txt2);margin-bottom:8px;}
.empty p{font-size:14px;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);color:var(--txt);padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;border:1px solid var(--bg4);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* VIDEO MODAL */
#vmodal{display:none;position:fixed;inset:0;z-index:500;background:var(--modal-bg);align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
#vmodal.open{display:flex;}
#vmodal-inner{background:var(--bg2);border-radius:14px;width:100%;max-width:920px;overflow:hidden;animation:mopen .25s cubic-bezier(.4,0,.2,1);position:relative;border:1px solid var(--border);}
@keyframes mopen{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
#vmodal-close{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background var(--ease);}
#vmodal-close:hover{background:rgba(255,255,255,.2);}
#vmodal-close svg{width:20px;height:20px;fill:currentColor;}
/* Minimize button */
#vmodal-min{position:absolute;top:12px;left:56px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background var(--ease);}
#vmodal-min:hover{background:rgba(255,255,255,.2);}
#vmodal-min svg{width:18px;height:18px;fill:currentColor;}
#vmodal-player{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
#vmodal-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
#vmodal-info{padding:18px 22px 22px;direction:rtl;}
#vmodal-title{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:8px;}
#vmodal-date{font-size:12px;color:var(--txt3);margin-bottom:10px;}
#vmodal-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
#vmodal-channel{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);cursor:pointer;}
#vmodal-channel:hover{color:var(--blue);}
#vmodal-ch-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;overflow:hidden;}
#vmodal-ch-av img{width:100%;height:100%;object-fit:cover;}
#vmodal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.mod-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:none;color:var(--txt);border-radius:20px;padding:8px 16px;font-size:13px;font-family:'Rubik',sans-serif;cursor:pointer;transition:background var(--ease),color var(--ease);}
.mod-btn:hover{background:var(--bg4);}
.mod-btn svg{width:16px;height:16px;fill:currentColor;}
.mod-btn.liked{background:rgba(255,78,78,.18);color:var(--like);}
.mod-btn.followed{background:rgba(62,166,255,.15);color:var(--blue);}
#vmodal-divider{height:1px;background:var(--border);margin:12px 0;}
#vmodal-desc{font-size:13px;color:var(--txt2);line-height:1.7;max-height:100px;overflow:hidden;white-space:pre-line;transition:max-height .3s;}
#vmodal-desc.exp{max-height:400px;}
#vmodal-expand{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Rubik',sans-serif;margin-top:6px;padding:0;display:flex;align-items:center;gap:4px;}

/* MINI PLAYER */
#mini-player{position:fixed;bottom:20px;left:20px;width:308px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);box-shadow:0 12px 40px var(--shadow);z-index:600;display:none;flex-direction:column;overflow:hidden;animation:mpIn .2s ease;}
#mini-player.show{display:flex;}
@keyframes mpIn{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.mp-vid{position:relative;width:100%;aspect-ratio:16/9;background:#000;cursor:pointer;}
.mp-vid iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.mp-bar{padding:8px 10px;display:flex;align-items:center;gap:6px;background:var(--bg2);}
.mp-title{flex:1;font-size:11px;color:var(--txt);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;cursor:pointer;}
.mp-title:hover{color:var(--blue);}
.mp-btn{width:26px;height:26px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:background var(--ease);flex-shrink:0;}
.mp-btn:hover{background:var(--bg3);}
.mp-btn svg{width:14px;height:14px;fill:currentColor;}

/* NOTIFICATIONS */
#notif-panel{position:fixed;top:calc(var(--th) + 8px);left:16px;width:340px;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-height:420px;overflow-y:auto;transform:translateY(-8px);}
#notif-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
.notif-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);}
.notif-hdr h3{font-size:14px;font-weight:600;}
.notif-clear{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Rubik',sans-serif;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;cursor:pointer;transition:background var(--ease);direction:rtl;}
.notif-item:hover{background:var(--bg3);}
.notif-item.unread{border-inline-start:3px solid var(--red);}
.notif-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
.notif-av img{width:100%;height:100%;object-fit:cover;}
.notif-body{flex:1;min-width:0;}
.notif-txt{font-size:13px;line-height:1.4;margin-bottom:3px;}
.notif-time{font-size:11px;color:var(--txt3);}
.notif-empty{padding:30px;text-align:center;color:var(--txt3);font-size:13px;line-height:1.6;}

/* CONTEXT MENU */
#ctx-menu{display:none;position:fixed;z-index:9999;background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;box-shadow:0 4px 20px var(--shadow);padding:4px 0;min-width:200px;font-size:13px;}
.ctx-item{padding:10px 16px;cursor:pointer;color:var(--txt);transition:background var(--ease);display:flex;align-items:center;gap:8px;}
.ctx-item:hover{background:var(--bg3);}
.ctx-item svg{width:15px;height:15px;fill:currentColor;flex-shrink:0;opacity:.7;}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* HERO CAROUSEL */
.hero-carousel-nav{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:space-between;padding:0 8px;z-index:4;}
.hero-arr{pointer-events:all;background:rgba(0,0,0,.55);border:none;color:#fff;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--ease);}
.hero-player-wrap:hover .hero-arr{opacity:1;}
.hero-arr svg{width:18px;height:18px;fill:currentColor;}
.hero-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5;pointer-events:none;}
.hero-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.45);border:none;padding:0;cursor:pointer;pointer-events:all;transition:all .2s;}
.hero-dot.on{background:#fff;width:18px;border-radius:4px;}
.hero-tbar{position:absolute;bottom:0;left:0;height:3px;background:var(--red);z-index:6;width:0;}
.hero-tbar.run{transition:width 3s linear;width:100%;}

/* CHANNEL GRID (search) */
.ch-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:10px;}
@media(max-width:800px){.ch-grid-4{grid-template-columns:repeat(2,1fr);}}
.ch-g-card{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:background var(--ease),border-color var(--ease);text-align:center;}
.ch-g-card:hover{background:var(--bg3);border-color:var(--blue);}
.ch-g-av{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;overflow:hidden;flex-shrink:0;}
.ch-g-av img{width:100%;height:100%;object-fit:cover;}
.ch-g-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;}
.ch-g-sub{font-size:11px;color:var(--txt3);}
.ch-g-fbtn{font-size:11px;font-weight:600;padding:4px 12px;border-radius:12px;border:none;cursor:pointer;font-family:'Rubik',sans-serif;margin-top:2px;}
.ch-g-fbtn.off{background:var(--red);color:#fff;}
.ch-g-fbtn.on{background:var(--bg3);color:var(--txt2);border:1px solid var(--bg4);}
.ch-more-btn{display:flex;align-items:center;gap:5px;margin:8px auto 0;background:none;border:1px solid var(--bg4);color:var(--blue);border-radius:8px;padding:6px 16px;font-size:12px;cursor:pointer;font-family:'Rubik',sans-serif;}
.ch-more-btn:hover{background:var(--bg3);}

/* SHORTS */
.shorts-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.shorts-row::-webkit-scrollbar{display:none;}
.short-card{flex-shrink:0;width:152px;border-radius:12px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:transform var(--ease);animation:fu .35s both;}
.short-card:hover{transform:translateY(-3px);}
.short-thumb{position:relative;aspect-ratio:9/16;background:var(--bg3);overflow:hidden;}
.short-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.short-card:hover .short-thumb img{transform:scale(1.04);}
.short-thumb .splay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);opacity:0;transition:opacity var(--ease);}
.short-card:hover .splay{opacity:1;}
.splay-c{width:42px;height:42px;border-radius:50%;background:rgba(220,0,0,.88);display:flex;align-items:center;justify-content:center;}
.splay-c svg{width:18px;height:18px;fill:#fff;margin-inline-start:2px;}
.short-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;letter-spacing:.5px;}
.short-info{padding:7px 8px 9px;}
.short-title{font-size:11px;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--txt);margin-bottom:3px;}
.short-ch{font-size:10px;color:var(--txt3);}
/* Inline short player */
.short-inline-player{position:absolute;inset:0;z-index:10;}
.short-inline-player iframe{width:100%;height:100%;border:none;}
.short-close-btn{position:absolute;top:6px;left:6px;z-index:11;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.short-close-btn svg{width:14px;height:14px;fill:currentColor;}

/* NOTIF BADGE */
.bell-wrap{position:relative;}
.notif-badge{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:var(--red);font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;color:#fff;pointer-events:none;border:2px solid var(--bg);}
.notif-badge.vis{display:flex;}

/* Avatar generic */
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ffd93d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;transition:transform var(--ease);overflow:hidden;}
.avatar:hover{transform:scale(1.1);}
.avatar img{width:100%;height:100%;object-fit:cover;}

@media(max-width:900px){.hero-inner{grid-template-columns:1fr;}.hero-info{display:none;}}
@media(max-width:760px){#sidebar{display:none;}#main{margin-inline-end:0!important;padding:16px 14px;}.vgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}#search-area{max-width:none;}#vmodal-inner{max-width:100%;}#notif-panel{right:8px;left:8px;width:auto;}#mini-player{left:8px;right:8px;width:auto;}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
</style>
</head>
<body>

<div id="topbar">
  <button class="tbtn" onclick="toggleSB()">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <a href="#" id="logo" onclick="goHome(event)">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zm12-3c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10z"/></svg>
    </div>
    <span class="logo-txt">My<span>Tube</span></span>

  <div id="search-area">
    <input id="search-input" type="text" placeholder="חיפוש..." oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Enter')doSearch()">

      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

  <div class="tb-r">

      <span class="quota-val">—</span>
    </div>
    <button class="tbtn" onclick="toggleTheme()" title="שנה עיצוב">
      <svg id="theme-icon" viewBox="0 0 24 24"><path d="M20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69L23.31 12 20 8.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
    </button>
    <div class="bell-wrap">
      <button class="tbtn" id="bell-btn" onclick="toggleNotifPanel()">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
      <div class="notif-badge" id="notif-badge"></div>
    </div>
    <div id="yt-user-area" onclick="toggleYTPanel()"></div>
  </div>
</div>

<!-- YouTube Connect Panel -->
<div id="yt-panel">
  <h4>התחברות ל-YouTube</h4>
  <p>הכנס את מזהה הערוץ שלך ב-YouTube (מתחיל ב-@ או UC...)</p>
  <input id="yt-handle-input" type="text" placeholder="@handle או UC...">
  <button class="ytpanel-btn" onclick="connectYT()">התחבר</button>
  <button class="ytpanel-dis" id="yt-dis-btn" onclick="disconnectYT()">התנתק</button>
</div>

<div id="sidebar">
  <div class="nitem on" id="n-all" onclick="setSection('all',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></span>
    <span class="nl">דף הבית</span>
  </div>
  <div class="nitem" id="n-recommended" onclick="setSection('recommended',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
    <span class="nl">מומלצים</span>
  </div>
  <div class="nitem" id="n-liked" onclick="setSection('liked',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span>
    <span class="nl">אהבתי</span>
  </div>
  <div class="nitem" id="n-following" onclick="setSection('following',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></span>
    <span class="nl">עוקב אחרי</span>

// ===== API KEY ROTATION =====
const API_KEYS = [
  'AIzaSyCSK9j1UHoVymA_ViQa9jh8xis1QnYuHWo',
  'AIzaSyBe6tl5Maj-iJ9kixVJLmAEt3wg6ej02H4',

  'AIzaSyDzf_12LV7xvJ0icyRG18cM7W9b-wBjMKM'
];
let apiKeyIdx = parseInt(localStorage.getItem('mapiidx') || '0');
let apiCallsToday = JSON.parse(localStorage.getItem('mapicalls') || '{}');
const apiCallsDate = localStorage.getItem('mapicdate') || '';
const MAX_CALLS_PER_KEY = 90; // ~100 search units out of 10,000 quota

function getKey() {
  const today = new Date().toDateString();
  if (apiCallsDate !== today) {
    localStorage.setItem('mapicdate', today);
    localStorage.setItem('mapicalls', '{}');
    apiCallsToday = {};
  }
  return API_KEYS[apiKeyIdx % API_KEYS.length];
}

async function apiGet(baseUrl) {
  const key = getKey();
  const url = baseUrl + '&key=' + key;
  try {
    const r = await fetch(url);
    const d = await r.json();
    // Track usage
    apiCallsToday[key] = (apiCallsToday[key] || 0) + 1;
    localStorage.setItem('mapicalls', JSON.stringify(apiCallsToday));
    updateQuotaDisplay();
    if (d.error && (d.error.code === 403 || d.error.code === 429 || (d.error.errors && d.error.errors[0]?.reason === 'quotaExceeded'))) {
      // Rotate to next key
      apiKeyIdx = (apiKeyIdx + 1) % API_KEYS.length;
      localStorage.setItem('mapiidx', String(apiKeyIdx));
      toast('מחליף API מפתח...');
      const r2 = await fetch(baseUrl + '&key=' + getKey());
      return r2.json();
    }
    return d;
  } catch(e) { throw e; }
}

function updateQuotaDisplay() {
  const el = document.getElementById('quota-pill');
  if (!el) return;
  const totalRemaining = API_KEYS.reduce((sum, k) => sum + Math.max(0, MAX_CALLS_PER_KEY - (apiCallsToday[k] || 0)), 0);
  const pct = totalRemaining / (API_KEYS.length * MAX_CALLS_PER_KEY);
  el.querySelector('.quota-val').textContent = `${totalRemaining} בקשות`;
  el.className = 'quota-pill' + (pct < 0.15 ? ' crit' : pct < 0.35 ? ' low' : '');
  el.title = `מפתח ${(apiKeyIdx % API_KEYS.length) + 1}/${API_KEYS.length} פעיל | ${totalRemaining} בקשות נשארו היום`;
}

async function connectYT() {
  const handle = document.getElementById('yt-handle-input').value.trim();
  if (!handle) { toast('הכנס handle או channel ID'); return; }
  toast('מחפש ערוץ...');
  try {
    let url;
    if (handle.startsWith('UC') || handle.startsWith('HC')) {
      url = `https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${encodeURIComponent(handle)}`;
    } else {
      const clean = handle.replace(/^@/, '');
      url = `https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle=${encodeURIComponent(clean)}`;
    }
    const d = await apiGet(url);
    if (d.items && d.items.length) {
      const ch = d.items[0];
      const col = PAL[Math.abs(hsh(ch.snippet.title||'')) % PAL.length];
      ytUser = {
        name: ch.snippet.title,
        thumb: ch.snippet.thumbnails?.default?.url || ch.snippet.thumbnails?.medium?.url || '',
        channelId: ch.id,
        col
      };
      localStorage.setItem('mytuser', JSON.stringify(ytUser));
      renderYTUserArea();
      document.getElementById('yt-panel').classList.remove('open');
      toast('מחובר כ-' + ytUser.name);
    } else {
      toast('לא נמצא ערוץ. נסה שוב.');
    }
  } catch(e) { toast('שגיאה: ' + e.message); }
}

// ===== CHANNEL THUMBNAILS =====
async function fetchChannelThumbs(channelIds) {
  const missing = channelIds.filter(id => id && !chThumbCache[id]);
  if (!missing.length) return;
  const chunks = [];
  for (let i = 0; i < missing.length; i += 50) chunks.push(missing.slice(i, i + 50));
  for (const chunk of chunks) {
    try {
      const d = await apiGet(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${chunk.join(',')}&maxResults=50`);
      if (d.items) {
        for (const item of d.items) {
          const th = item.snippet?.thumbnails?.default?.url || item.snippet?.thumbnails?.medium?.url || '';
          if (th) chThumbCache[item.id] = th;
        }
        localStorage.setItem('mchth', JSON.stringify(chThumbCache));
      }
    } catch(e) {}
  }
}

function getChThumb(channelId) {
  return channelId ? (chThumbCache[channelId] || '') : '';
}

function mkChAvHTML(channelId, channelName, size = 34, fontSize = 12) {
  const col = PAL[Math.abs(hsh(channelName || '')) % PAL.length];
  const init = (channelName || '?').slice(0, 2).toUpperCase();
  const th = getChThumb(channelId);
  if (th) {
    return `<img src="${x(th)}" alt="${x(channelName)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;width:${size}px;height:${size}px;border-radius:50%;background:${col}22;color:${col};align-items:center;justify-content:center;font-size:${fontSize}px;font-weight:700">${init}</span>`;
  }
  return `<span style="width:${size}px;height:${size}px;border-radius:50%;background:${col}22;color:${col};display:flex;align-items:center;justify-content:center;font-size:${fontSize}px;font-weight:700">${init}</span>`;
}

  }
  fetchDiscoveryContent();
  setInterval(refreshFollowedChannels, 5 * 60 * 1000);
  fetchShortsRecommendations();

  document.addEventListener('click', e => {
    const p = document.getElementById('notif-panel');
    const b = document.getElementById('bell-btn');
    if (p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target))
      p.classList.remove('open');
    if (!document.getElementById('search-area').contains(e.target))
      document.getElementById('search-drop').classList.remove('show');
    document.getElementById('ctx-menu').style.display = 'none';
    const yp = document.getElementById('yt-panel');
    const ya = document.getElementById('yt-user-area');
    if (yp.classList.contains('open') && !yp.contains(e.target) && !ya.contains(e.target))
      yp.classList.remove('open');
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); document.getElementById('yt-panel').classList.remove('open'); } });
});

// ===== DISCOVERY CONTENT =====
async function fetchDiscoveryContent() {
  // Fetch trending Israeli content for home page discovery
  if (vids.length > 100) return; // already have plenty
  try {
    const queries = ['ישראל 2024 2025', 'ויראל ישראל', 'טלוויזיה ישראלית'];
    for (const q2 of queries.slice(0, 1)) {
      const d = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=30&q=${encodeURIComponent(q2)}&type=video&regionCode=${REGION}&relevanceLanguage=${LANG}&order=viewCount`);
      if (d.items) {
        const fetched = d.items.filter(i => i.id?.videoId).map(i => ({
          id: i.id.videoId, title: i.snippet.title, channel: i.snippet.channelTitle,
          channelId: i.snippet.channelId, thumb: i.snippet.thumbnails.high?.url || i.snippet.thumbnails.medium?.url,
          desc: i.snippet.description, publishedAt: i.snippet.publishedAt, isDiscovery: true
        }));
        mergeVids(fetched);
        // Fetch thumbnails for discovered channels
        const ids = [...new Set(fetched.map(v => v.channelId).filter(Boolean))];
        fetchChannelThumbs(ids);
      }
    }
    buildChMap(); saveVidsCache(); renderAll();
  } catch(e) {}
}

// ===== DATA FETCHING =====
async function searchYouTube(query = 'ישראל') {
  showSkels();
  searchChannels = [];
  try {
    const d1 = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&regionCode=${REGION}&relevanceLanguage=${LANG}`);
    if (d1.error) throw new Error(d1.error.message);

    const fetched = d1.items.filter(item => item.id?.videoId).map(item => ({
      id: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle,
      channelId: item.snippet.channelId, thumb: item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url,
      desc: item.snippet.description, publishedAt: item.snippet.publishedAt
    }));

    mergeVids(fetched);

    // Search channels too
    try {
      const d2 = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=8&q=${encodeURIComponent(query)}&type=channel&regionCode=${REGION}`);
      if (!d2.error) {
        searchChannels = d2.items.map(item => ({
          id: item.id.channelId, name: item.snippet.title, desc: item.snippet.description,
          thumb: item.snippet.thumbnails?.default?.url || item.snippet.thumbnails?.medium?.url
        }));
        for (const ch of searchChannels) if (ch.id && ch.name) { chIdMap[ch.name] = ch.id; if (ch.thumb) chThumbCache[ch.id] = ch.thumb; }
        // Also suggest related channels based on search
        await fetchRelatedChannels(query);
      }
    } catch(e2) {}

    // Fetch channel thumbnails for videos
    const chIds = [...new Set(fetched.map(v => v.channelId).filter(Boolean))];
    fetchChannelThumbs(chIds);

    buildChMap(); saveVidsCache(); buildSBChannels(); checkNewVids(); renderAll();
  } catch(e) { showErr('שגיאה: ' + e.message); }
}

// Fetch related/related channels based on the search topic
async function fetchRelatedChannels(query) {
  // Extract potential channel names from search results and also use query terms
  const words = query.split(/\s+/).filter(w => w.length > 2);
  const relatedQueries = words.map(w => w + ' ישראל').slice(0, 2);
  for (const rq of relatedQueries) {
    try {
      const d = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(rq)}&type=channel`);
      if (!d.error && d.items) {
        const relChannels = d.items.map(i => ({
          id: i.id.channelId, name: i.snippet.title, desc: i.snippet.description,
          thumb: i.snippet.thumbnails?.default?.url
        }));
        // Add to searchChannels as related suggestions (deduplicated)
        for (const rc of relChannels) {
          if (!searchChannels.find(c => c.id === rc.id)) searchChannels.push(rc);
          if (rc.id && rc.name) { chIdMap[rc.name] = rc.id; if (rc.thumb) chThumbCache[rc.id] = rc.thumb; }
        }
      }
    } catch(e) {}
  }
}

async function fetchChannelVideos(chId, chName, force = false) {
  if (!chId) return [];
  const lastFetch = chFetchTimes[chId] || 0;
  if (!force && Date.now() - lastFetch < CHANNEL_FETCH_COOLDOWN) return [];
  try {
    let all = [], pageToken = '', pages = 0;
    do {
      const d = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&channelId=${chId}&type=video&order=date${pageToken ? '&pageToken=' + pageToken : ''}`);
      if (d.error || !d.items) break;
      all = all.concat(d.items.filter(i => i.id?.videoId).map(i => ({
        id: i.id.videoId, title: i.snippet.title, channel: i.snippet.channelTitle || chName,
        channelId: i.snippet.channelId || chId,
        thumb: i.snippet.thumbnails.high?.url || i.snippet.thumbnails.medium?.url || `https://img.youtube.com/vi/${i.id.videoId}/hqdefault.jpg`,
        desc: i.snippet.description, publishedAt: i.snippet.publishedAt
      })));
      pageToken = d.nextPageToken || '';
      pages++;
    } while (pageToken && pages < 3);
    mergeVids(all);
    if (chName && chId) chIdMap[chName] = chId;
    for (const v of all) if (v.channel && v.channelId) chIdMap[v.channel] = v.channelId;
    chFetchTimes[chId] = Date.now();
    localStorage.setItem('mcft', JSON.stringify(chFetchTimes));
    buildChMap(); saveVidsCache();
    // Fetch channel thumbnail
    fetchChannelThumbs([chId]);
    return all;
  } catch(e) { return []; }
}

function mergeVids(newVids) {
  const existingIds = new Set(vids.map(v => v.id));
  for (const v of newVids) {
    if (!existingIds.has(v.id)) { vids.push(v); existingIds.add(v.id); }
  }
  if (vids.length > MAX_VIDS_CACHE) vids = vids.slice(0, MAX_VIDS_CACHE);
}

async function fetchFollowedChannelsVideos(force = false) {
  if (isFetchingChannels) return;
  isFetchingChannels = true;
  const channels = [...followed].filter(ch => !blockedChannels.includes(ch));
  if (!channels.length) { isFetchingChannels = false; return; }

  const ct = document.getElementById('content');
  let indicator = document.getElementById('fetch-indicator');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.id = 'fetch-indicator';
    indicator.className = 'fetch-indicator';
    indicator.innerHTML = `<svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> מעדכן ערוצים...`;
    ct.insertBefore(indicator, ct.firstChild);
  }

  let fetchedAny = false;
  for (const ch of channels) {
    const chId = chIdMap[ch];
    if (chId) {
      const res = await fetchChannelVideos(chId, ch, force);
      if (res.length) fetchedAny = true;
    } else {
      try {
        const d = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(ch)}&type=channel`);
        if (!d.error && d.items?.length) {
          const found = d.items[0];
          chIdMap[ch] = found.id.channelId;
          localStorage.setItem('mchids', JSON.stringify(chIdMap));
          const res = await fetchChannelVideos(found.id.channelId, ch, true);
          if (res.length) fetchedAny = true;
        }
      } catch(e) {}
    }
  }

  if (!fetchedAny && vids.length === 0) { isFetchingChannels = false; searchYouTube('מוזיקה ישראלית חדשות'); return; }
  isFetchingChannels = false;
  indicator?.remove();
  buildChMap(); buildSBChannels(); checkNewVids(); renderAll();
}

async function refreshFollowedChannels() {
  if (followed.size === 0) return;
  const channels = [...followed].filter(ch => !blockedChannels.includes(ch));
  for (const ch of channels) {
    const chId = chIdMap[ch];
    if (!chId) continue;
    const res = await fetchChannelVideos(chId, ch, false);
    if (res.length) { buildChMap(); checkNewVids(); renderAll(); }
  }
}

// ===== BUILD MAPS =====
function buildChMap() {
  chMap = {};
  for (const v of vids) {
    if (!v.channel) continue;
    if (!chMap[v.channel]) chMap[v.channel] = [];
    if (!chMap[v.channel].includes(v.id)) chMap[v.channel].push(v.id);
    if (v.channelId) chIdMap[v.channel] = v.channelId;
  }
}

function getSortedChannels() {
  return Object.keys(chMap).sort((a, b) => (chWatches[b] || 0) - (chWatches[a] || 0));
}

function recordWatch(ch) {
  if (!ch) return;
  chWatches[ch] = (chWatches[ch] || 0) + 1;
  localStorage.setItem('mcw', JSON.stringify(chWatches));
}

function addToWatched(vid) {
  if (!vid) return;
  watchedVids = watchedVids.filter(v => v.id !== vid.id);
  watchedVids.unshift(vid);
  if (watchedVids.length > 100) watchedVids = watchedVids.slice(0, 100);
  localStorage.setItem('mwatched', JSON.stringify(watchedVids));
}

// ===== HERO CAROUSEL =====
let heroVids = [], heroIdx = 0, heroTimer = null;

function renderHero() {
  const heroEl = document.getElementById('hero');
  if (section !== 'all' || q || channelFilter) { heroEl.style.display = 'none'; _stopHeroTimer(); return; }
  const candidates = getRec().map(id => vids.find(vv => vv.id === id))
    .filter(v => v && !blockedVids.includes(v.id) && !blockedChannels.includes(v.channel));
  if (!candidates.length) { heroEl.style.display = 'none'; _stopHeroTimer(); return; }
  const seen = new Set(); heroVids = [];
  for (const v of candidates) { if (!seen.has(v.channel)) { seen.add(v.channel); heroVids.push(v); } if (heroVids.length >= 5) break; }
  if (!heroVids.length) heroVids = candidates.slice(0, 5);
  if (heroIdx >= heroVids.length) heroIdx = 0;
  _loadHeroSlide(heroIdx);
  heroEl.style.display = 'block';
  _startHeroTimer();
}

function _loadHeroSlide(i) {
  heroIdx = i;
  const v = heroVids[i];
  heroVid = v; heroPlaying = false;
  document.getElementById('hero-thumb').src = v.thumb;
  document.getElementById('hero-title').textContent = v.title;
  document.getElementById('hero-ch-name').textContent = v.channel;
  document.getElementById('hero-desc').textContent = v.desc || '';
  const col = PAL[Math.abs(hsh(v.channel || '')) % PAL.length];
  const av = document.getElementById('hero-ch-av');
  av.style.background = col + '22'; av.style.color = col;
  const th = getChThumb(v.channelId);
  av.innerHTML = th ? `<img src="${x(th)}" onerror="this.remove()">` : (v.channel || '?').slice(0, 2).toUpperCase();
  const wrap = document.getElementById('hero-player-wrap');
  wrap.classList.remove('hero-playing'); wrap.querySelector('iframe')?.remove();
  document.getElementById('hero-play-btn').style.display = '';
  updateHeroLike(); updateHeroFollow();
  const dotsEl = document.getElementById('hero-dots'); if (!dotsEl) return;
  dotsEl.innerHTML = '';
  heroVids.forEach((_, di) => {
    const d = document.createElement('button'); d.className = 'hero-dot' + (di === i ? ' on' : '');
    d.onclick = e => { e.stopPropagation(); _loadHeroSlide(di); _resetHeroTimer(); };
    dotsEl.appendChild(d);
  });
}

function heroNext() { _loadHeroSlide((heroIdx + 1) % heroVids.length); _resetHeroTimer(); }
function heroPrev() { _loadHeroSlide((heroIdx - 1 + heroVids.length) % heroVids.length); _resetHeroTimer(); }
function _startHeroTimer() {
  _stopHeroTimer();
  if (heroVids.length < 2) return;
  const bar = document.getElementById('hero-tbar');
  if (bar) { bar.style.transition = 'none'; bar.style.width = '0%'; setTimeout(() => { bar.style.transition = 'width 3s linear'; bar.style.width = '100%'; }, 30); }
  heroTimer = setTimeout(() => { heroNext(); }, 3000);
}
function _stopHeroTimer() { clearTimeout(heroTimer); heroTimer = null; const bar = document.getElementById('hero-tbar'); if (bar) { bar.style.transition = 'none'; bar.style.width = '0%'; } }
function _resetHeroTimer() { _stopHeroTimer(); _startHeroTimer(); }

function heroPlay() {
  if (!heroVid || heroPlaying) return;
  heroPlaying = true;
  _stopHeroTimer();
  recordWatch(heroVid.channel);
  addToWatched(heroVid);
  const wrap = document.getElementById('hero-player-wrap');
  wrap.classList.add('hero-playing');
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${heroVid.id}?autoplay=1&rel=0`;
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  wrap.appendChild(iframe);
}

function heroToggleLike() {
  if (!heroVid) return;
  const id = heroVid.id;
  likes.has(id) ? likes.delete(id) : likes.add(id);
  localStorage.setItem('ml', JSON.stringify([...likes]));
  updateHeroLike(); updateLikeInDOM(id);
}
function heroToggleFollow() { if (heroVid?.channel) { toggleFollow(heroVid.channel); updateHeroFollow(); } }
function updateHeroLike() {
  if (!heroVid) return;
  const liked = likes.has(heroVid.id);
  document.getElementById('hero-like-btn').classList.toggle('liked', liked);
  document.getElementById('hero-heart').setAttribute('d', liked ? HEART_FULL : HEART_OUT);
  document.getElementById('hero-like-txt').textContent = liked ? 'הסר מאהבתי' : 'אהבתי';
}
function updateHeroFollow() {
  if (!heroVid) return;
  const isF = followed.has(heroVid.channel);
  document.getElementById('hero-follow-btn').classList.toggle('followed', isF);
  document.getElementById('hero-follow-txt').textContent = isF ? 'מפסיק לעקוב' : 'עקוב';
}

// ===== FOLLOW =====
function toggleFollow(ch) {
  if (followed.has(ch)) {
    followed.delete(ch);
    toast('הפסקת לעקוב אחרי ' + ch);
  } else {
    followed.add(ch);
    toast('עוקב עכשיו אחרי ' + ch);
    initialFollowSet.add(ch); // Mark to skip notifications on first fetch
    const chId = chIdMap[ch];
    if (chId) {
      fetchChannelVideos(chId, ch, true).then(res => {
        if (res.length) {
          buildChMap();
          // Set baseline AFTER fetch to avoid spurious notifications
          chLastVids[ch] = [...(chMap[ch] || [])];
          localStorage.setItem('mlv', JSON.stringify(chLastVids));
          initialFollowSet.delete(ch);
          buildSBChannels(); renderAll();
        } else {
          initialFollowSet.delete(ch);
        }
      });
    } else {
      apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(ch)}&type=channel`)
        .then(d => {
          if (!d.error && d.items?.length) {
            const chId2 = d.items[0].id.channelId;
            chIdMap[ch] = chId2;
            localStorage.setItem('mchids', JSON.stringify(chIdMap));
            return fetchChannelVideos(chId2, ch, true);
          }
        })
        .then(res => {
          if (res?.length) {
            buildChMap();
            chLastVids[ch] = [...(chMap[ch] || [])];
            localStorage.setItem('mlv', JSON.stringify(chLastVids));
            buildSBChannels(); renderAll();
          }
          initialFollowSet.delete(ch);
        })
        .catch(() => { initialFollowSet.delete(ch); });
    }
  }
  localStorage.setItem('mf', JSON.stringify([...followed]));
  buildSBChannels(); renderAll();
  if (modalVid) updateModalFollow();
}

// ===== NOTIFICATIONS =====
function checkNewVids() {
  let found = 0;
  for (const ch of followed) {
    if (blockedChannels.includes(ch) || initialFollowSet.has(ch)) continue;
    const cur = chMap[ch] || [], last = chLastVids[ch] || [];
    const newIds = cur.filter(id => !last.includes(id) && !blockedVids.includes(id));
    for (const id of newIds) {
      const v = vids.find(xx => xx.id === id);
      addNotif(ch, v ? (v.title || 'סרטון חדש') : 'סרטון חדש', id);
      found++;
    }
    if (newIds.length) chLastVids[ch] = [...cur];
  }
  if (found) { localStorage.setItem('mlv', JSON.stringify(chLastVids)); renderNotifs(); updateBadge(); }
}

function getNewVidIds() {
  const r = [];
  for (const ch of followed) {
    if (blockedChannels.includes(ch) || initialFollowSet.has(ch)) continue;
    const cur = chMap[ch] || [], last = chLastVids[ch] || [];
    cur.filter(id => !last.includes(id) && !blockedVids.includes(id)).forEach(id => r.push(id));
  }
  return r;
}

function addNotif(ch, title, vidId) {
  notifications.unshift({ id: Date.now() + Math.random(), channel: ch, title, vidId, time: new Date().toISOString(), read: false });
  if (notifications.length > 50) notifications = notifications.slice(0, 50);
  localStorage.setItem('mn', JSON.stringify(notifications));
}

function renderNotifs() {
  const list = document.getElementById('notif-list'); if (!list) return;
  list.innerHTML = '';
  if (!notifications.length) { list.innerHTML = '<div class="notif-empty">אין התראות עדיין<br><br>עקוב אחרי ערוץ לקבלת התראות.</div>'; return; }
  for (const n of notifications) {
    const col = PAL[Math.abs(hsh(n.channel || '')) % PAL.length];
    const chId = chIdMap[n.channel || ''];
    const th = getChThumb(chId);
    const el = document.createElement('div');
    el.className = 'notif-item' + (n.read ? '' : ' unread');
    el.innerHTML = `<div class="notif-av" style="background:${col}22;color:${col}">${th ? `<img src="${x(th)}" onerror="this.remove()">` : (n.channel || '?').slice(0, 2).toUpperCase()}</div><div class="notif-body"><div class="notif-txt"><strong>${x(n.channel)}</strong>: ${x(n.title)}</div><div class="notif-time">${fmtTime(n.time)}</div></div>`;
    el.onclick = () => {
      n.read = true; localStorage.setItem('mn', JSON.stringify(notifications)); updateBadge(); renderNotifs();
      const v = vids.find(vv => vv.id === n.vidId);
      if (v) { document.getElementById('notif-panel').classList.remove('open'); openModal(v); }
    };
    list.appendChild(el);
  }
}

function clearNotifs() { notifications.forEach(n => n.read = true); localStorage.setItem('mn', JSON.stringify(notifications)); updateBadge(); renderNotifs(); }
function updateBadge() { const b = document.getElementById('notif-badge'); if (!b) return; const u = notifications.filter(n => !n.read).length; b.textContent = u > 9 ? '9+' : u; b.classList.toggle('vis', u > 0); }
function toggleNotifPanel() { document.getElementById('notif-panel').classList.toggle('open'); }
function fmtTime(iso) { if (!iso) return ''; const d = Date.now() - new Date(iso).getTime(); if (d < 60000) return 'עכשיו'; if (d < 3600000) return `לפני ${Math.floor(d / 60000)} דק'`; if (d < 86400000) return `לפני ${Math.floor(d / 3600000)} שע'`; return `לפני ${Math.floor(d / 86400000)} ימים`; }

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  if (diff < 3600000) return `לפני ${Math.floor(diff / 60000)} דקות`;
  if (diff < 86400000) return `לפני ${Math.floor(diff / 3600000)} שעות`;
  if (diff < 7 * 86400000) return `לפני ${Math.floor(diff / 86400000)} ימים`;
  if (diff < 30 * 86400000) return `לפני ${Math.floor(diff / 7 / 86400000)} שבועות`;
  if (diff < 365 * 86400000) return `לפני ${Math.floor(diff / 30 / 86400000)} חודשים`;
  return `לפני ${Math.floor(diff / 365 / 86400000)} שנים`;
}

async function fetchDesc(v) {
  try {
    const r = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${v.id}`);
    if (r.ok) { const d = await r.json(); if (d.description) return d.description; }
  } catch {}
  return `סרטון מאת ${v.channel || 'ערוץ YouTube'}.`;
}

// ===== LIKE DOM UPDATE =====
function updateLikeInDOM(id) {
  const isLiked = likes.has(id);
  document.querySelectorAll(`.liked-btn[data-id="${id}"]`).forEach(btn => {
    btn.classList.toggle('on', isLiked);
    btn.querySelector('path').setAttribute('d', isLiked ? HEART_FULL : HEART_OUT);
    const card = btn.closest('.vcard');
    if (card) {
      card.classList.toggle('is-liked', isLiked);
      const vtxt = card.querySelector('.vtxt');
      if (vtxt) {
        let label = vtxt.querySelector('.vlabel');

function toggleLike(id) {

// ===== RECOMMENDATIONS =====
function getRec() {
  const sorted = getSortedChannels();
  const picks = [];
  for (const ch of sorted) for (const id of (chMap[ch] || [])) if (!picks.includes(id)) picks.push(id);
  for (const v of vids) if (!picks.includes(v.id)) picks.push(v.id);
  return picks;
}

// ===== SHORTS =====
async function fetchShortsRecommendations() {
  if (Date.now() - shortsFetchTime < SHORTS_COOLDOWN) return;
  const topChannels = Object.entries(chWatches).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  const queries = [];
  if (topChannels.length) queries.push(`${topChannels[0]} shorts`);
  queries.push('שורטסים ישראל', '#shorts ישראל');
  const seen = new Set(shortsVids.map(v => v.id));
  let fetched = [];
  for (const q2 of queries.slice(0, 2)) {
    try {
      const d = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(q2)}&type=video&videoDuration=short&regionCode=${REGION}&relevanceLanguage=${LANG}`);
      if (!d.error && d.items) {
        for (const item of d.items) {
          if (!item.id?.videoId || seen.has(item.id.videoId)) continue;
          fetched.push({ id: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle, channelId: item.snippet.channelId, thumb: item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url, desc: item.snippet.description, publishedAt: item.snippet.publishedAt, isShort: true });
          seen.add(item.id.videoId);
        }
      }
    } catch(e) {}
  }
  if (fetched.length) {
    shortsVids = [...fetched, ...shortsVids].slice(0, 60);
    shortsFetchTime = Date.now();
    localStorage.setItem('mshortvids', JSON.stringify(shortsVids));
    localStorage.setItem('mshortft', String(shortsFetchTime));
  }
}

      for (const ch of followed) {
        if (blockedChannels.includes(ch)) continue;
        const cv = (chMap[ch] || []).map(id => vids.find(v => v.id === id)).filter(v => v && !blockedVids.includes(v.id));
        if (!cv.length) continue;
        const c = PAL[Math.abs(hsh(ch)) % PAL.length];
        ct.appendChild(mkSec(ch, cv, '<path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>', c, false, null, newIds));
        shown++;
      }
      if (!shown) ct.appendChild(mkEmpty('לא נמצאו סרטונים', 'מרענן ערוצים...'));
    }
  }

  if (section === 'watched') {
    const wv = watchedVids.filter(v => !blockedVids.includes(v.id) && !blockedChannels.includes(v.channel));
    if (wv.length) ct.appendChild(mkSec('צפיתי', wv, '<path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>', '#20c997', false));
    else ct.appendChild(mkEmpty('לא צפית עדיין בסרטונים', ''));
  }

  if (section === 'shorts') { renderShortsSection(ct); return; }

  if (!ct.children.length && section !== 'all') ct.appendChild(mkEmpty('לא נמצאו סרטונים', ''));
}

// ===== FEATURED CARD =====
function mkFeaturedCard(v) {
  const col = PAL[Math.abs(hsh(v.channel || '')) % PAL.length];
  const init = (v.channel || '?').slice(0, 2).toUpperCase();
  const th = getChThumb(v.channelId);
  const el = document.createElement('div'); el.className = 'featured-vid';
  el.innerHTML = `
    <img src="${v.thumb}" alt="${x(v.title)}" onerror="this.src='https://img.youtube.com/vi/${v.id}/default.jpg'">
    <div class="featured-play-hint"><div class="fpc"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
    <div class="featured-overlay">
      <div class="featured-badge">מומלץ</div>
      <div class="featured-title">${x(v.title)}</div>
      <div class="featured-meta">
        <div class="featured-av" style="background:${col}22;color:${col}">${th ? `<img src="${x(th)}" onerror="this.remove()">` : `<span style="font-size:10px;font-weight:700;width:100%;height:100%;display:flex;align-items:center;justify-content:center">${init}</span>`}</div>
        <span>${x(v.channel)}</span>
        ${v.publishedAt ? `<span class="featured-date">• ${fmtDate(v.publishedAt)}</span>` : ''}

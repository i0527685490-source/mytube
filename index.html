}

// ===== CHANNEL PAGE =====
let chPageTab = 'videos';
async function renderChannelPage(ct) {
  const ch = channelFilter;
  const col = PAL[Math.abs(hsh(ch)) % PAL.length];
  const chId = chIdMap[ch];
  const isF = followed.has(ch);
  const th = getChThumb(chId);

  // Header
  const hdr = document.createElement('div'); hdr.className = 'ch-page-hdr';
  hdr.innerHTML = `
    <div class="ch-page-av" style="background:${col}22;color:${col}">${th ? `<img src="${x(th)}" onerror="this.remove()">` : ch.slice(0, 2).toUpperCase()}</div>
    <div style="flex:1"><div class="ch-page-name">${x(ch)}</div><div class="ch-page-sub" id="ch-page-sub">טוען...</div></div>
    <button class="ch-follow-btn${isF ? ' following' : ''}" id="ch-follow-top">${isF ? 'מפסיק לעקוב' : 'עקוב'}</button>`;
  ct.appendChild(hdr);
  hdr.querySelector('#ch-follow-top').onclick = () => { toggleFollow(ch); hdr.querySelector('#ch-follow-top').textContent = followed.has(ch) ? 'מפסיק לעקוב' : 'עקוב'; hdr.querySelector('#ch-follow-top').className = 'ch-follow-btn' + (followed.has(ch) ? ' following' : ''); };

  // Tabs
  const tabs = document.createElement('div'); tabs.className = 'ch-tabs';
  ['videos','shorts','playlists'].forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'ch-tab' + (chPageTab === t ? ' on' : '');
    btn.textContent = t === 'videos' ? 'סרטונים' : t === 'shorts' ? 'Shorts' : 'פלייליסטים';
    btn.onclick = () => { chPageTab = t; tabs.querySelectorAll('.ch-tab').forEach(b => b.classList.remove('on')); btn.classList.add('on'); renderChTabContent(ch, chId, t, tabContent); };
    tabs.appendChild(btn);
  });
  ct.appendChild(tabs);

  // Fetch if needed
  if (chId && (chMap[ch] || []).length < 5) {
    const ind = document.createElement('div'); ind.className = 'fetch-indicator';
    ind.innerHTML = `<svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg> טוען סרטונים...`;
    ct.appendChild(ind);
    await fetchChannelVideos(chId, ch, true);
    ind.remove();
  } else if (!chId) {
    try {
      const d = await apiGet(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(ch)}&type=channel`);
      if (!d.error && d.items?.length) {
        const chId2 = d.items[0].id.channelId;
        chIdMap[ch] = chId2;
        localStorage.setItem('mchids', JSON.stringify(chIdMap));
        await fetchChannelVideos(chId2, ch, true);
      }
    } catch(e) {}
  }

  const finalVids = (chMap[ch] || []).map(id => vids.find(v => v.id === id)).filter(v => v && !blockedVids.includes(v.id));
  document.getElementById('ch-page-sub').textContent = `${finalVids.length} סרטונים זמינים`;

  const tabContent = document.createElement('div');
  ct.appendChild(tabContent);
  renderChTabContent(ch, chIdMap[ch], chPageTab, tabContent);
}

function renderChTabContent(ch, chId, tab, container) {
  container.innerHTML = '';
  const allVids = (chMap[ch] || []).map(id => vids.find(v => v.id === id)).filter(v => v && !blockedVids.includes(v.id));

  if (tab === 'videos') {
    const regularVids = allVids.filter(v => !v.isShort);
    if (regularVids.length) {
      const g = document.createElement('div'); g.className = 'vgrid';
      regularVids.forEach((v, i) => g.appendChild(mkCard(v, i * 30)));
      container.appendChild(g);
    } else {
      container.appendChild(mkEmpty('אין סרטונים', ''));
    }
  } else if (tab === 'shorts') {
    const sv = allVids.filter(v => v.isShort);
    // Also get from shortsVids for this channel
    const sv2 = shortsVids.filter(v => v.channel === ch && !allVids.find(vv => vv.id === v.id));
    const combined = [...sv, ...sv2].filter(v => !blockedVids.includes(v.id));
    if (combined.length) {
      const row = document.createElement('div'); row.className = 'shorts-row'; row.style.flexWrap = 'wrap'; row.style.justifyContent = 'flex-start';
      combined.forEach((v, i) => row.appendChild(mkShortCard(v, i)));
      container.appendChild(row);
    } else {
      container.appendChild(mkEmpty('אין Shorts מהערוץ הזה', ''));
    }
  } else if (tab === 'playlists') {
    if (chId) fetchPlaylists(chId, container);
    else container.appendChild(mkEmpty('לא נמצאו פלייליסטים', ''));
  }
}

async function fetchPlaylists(chId, container) {
  try {
    const d = await apiGet(`https://www.googleapis.com/youtube/v3/playlists?part=snippet&maxResults=10&channelId=${chId}`);
    if (d.items && d.items.length) {
      const sec = document.createElement('div'); sec.className = 'section';
      sec.innerHTML = `<div class="sec-hdr"><div class="sec-title"><div class="sec-ico" style="background:#74c0fc22;color:#74c0fc"><svg viewBox="0 0 24 24"><path d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z"/></svg></div>פלייליסטים</div></div>`;
      const grid = document.createElement('div'); grid.className = 'vgrid row';
      d.items.forEach((item, i) => {
        const plThumb = item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || '';
        const el = document.createElement('div'); el.className = 'vcard'; el.style.animationDelay = (i * 25) + 'ms';
        el.innerHTML = `<div class="vthumb"><img src="${plThumb}" alt="${x(item.snippet.title)}" onerror="this.src=''"><div class="vhover"></div></div><div class="vinfo"><div class="vtxt"><div class="vtitle">${x(item.snippet.title)}</div><div class="vch">פלייליסט</div></div></div>`;
        el.onclick = () => window.open(`https://www.youtube.com/playlist?list=${item.id}`, '_blank');
        grid.appendChild(el);
      });
      sec.appendChild(grid); container.appendChild(sec);
    } else {
      container.appendChild(mkEmpty('אין פלייליסטים', ''));
    }
  } catch(e) { container.appendChild(mkEmpty('שגיאה בטעינת פלייליסטים', '')); }
}

// ===== SEARCH RENDER =====
function renderSearch(ct) {
  const visibleChs = searchChannels.filter(ch => !blockedChannels.includes(ch.name));
  if (visibleChs.length) {
    const sec = document.createElement('div'); sec.className = 'section';
    const hdr = document.createElement('div'); hdr.className = 'sec-hdr';
    hdr.innerHTML = `<div class="sec-title"><div class="sec-ico" style="background:#4d96ff22;color:#4d96ff"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></div>ערוצים קשורים</div>`;
    sec.appendChild(hdr);
    let showN = 4;
    const grid = document.createElement('div'); grid.className = 'ch-grid-4'; sec.appendChild(grid);
    const moreBtn = document.createElement('button'); moreBtn.className = 'ch-more-btn';
    function drawGrid() {
      grid.innerHTML = '';
      visibleChs.slice(0, showN).forEach(ch => {
        const col = PAL[Math.abs(hsh(ch.name || '')) % PAL.length];
        const isF = followed.has(ch.name);
        const el = document.createElement('div'); el.className = 'ch-g-card';
        el.innerHTML = `<div class="ch-g-av" style="background:${col}22;color:${col}">${ch.thumb ? `<img src="${x(ch.thumb)}" alt="" onerror="this.style.display='none'">` : ''}<span style="display:${ch.thumb?'none':'flex'};width:100%;height:100%;align-items:center;justify-content:center">${(ch.name||'?').slice(0,2).toUpperCase()}</span></div><div class="ch-g-name">${x(ch.name)}</div><div class="ch-g-sub">${x((ch.desc||'').slice(0,40)) || 'ערוץ YouTube'}</div><button class="ch-g-fbtn ${isF?'on':'off'}">${isF?'עוקב ✓':'+ עקוב'}</button>`;
        el.querySelector('.ch-g-fbtn').onclick = e => { e.stopPropagation(); toggleFollow(ch.name); drawGrid(); };
        el.onclick = () => { pushNav(); channelFilter = ch.name; q = ''; document.getElementById('search-input').value = ''; buildSBChannels(); renderAll(); };
        el.oncontextmenu = e => showCtx(e, 'channel', null, ch.name);
        grid.appendChild(el);
      });
      if (visibleChs.length > showN) {
        moreBtn.innerHTML = `<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg> עוד ${visibleChs.length - showN} ערוצים`;
        if (!moreBtn.parentNode) sec.appendChild(moreBtn);
      } else { moreBtn.remove(); }
    }
    moreBtn.onclick = () => { showN = visibleChs.length; drawGrid(); };
    drawGrid(); ct.appendChild(sec);
  }
  const filt = vids.filter(v => (v.title || '').toLowerCase().includes(q.toLowerCase()) || (v.channel || '').toLowerCase().includes(q.toLowerCase())).filter(v => !blockedVids.includes(v.id) && !blockedChannels.includes(v.channel));
  if (filt.length) ct.appendChild(mkSec(`תוצאות: "${q}"`, filt, '<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>', '#aaa', false));
  else if (!visibleChs.length) ct.appendChild(mkEmpty('לא נמצאו תוצאות', 'נסה מילת חיפוש אחרת'));
}

// ===== INLINE PLAY IN CARD =====
function playInCard(v, thumbEl) {
  if (!thumbEl) return;
  // If already playing this card, do nothing
  if (thumbEl.querySelector('iframe')) return;
  // Stop any other mini player / modal playback
  stopAnyCurrentPlayback();
  // Remove any other inline card players
  document.querySelectorAll('.vthumb iframe').forEach(ifr => {
    const parent = ifr.closest('.vthumb');
    if (parent && parent !== thumbEl) {
      ifr.remove();
      parent.classList.remove('playing');
    }
  });
  thumbEl.classList.add('playing');
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0`;
  iframe.allow = 'autoplay; encrypted-media';
  iframe.allowFullscreen = true;
  thumbEl.appendChild(iframe);
  recordWatch(v.channel);
  addToWatched(v);
}

// ===== CARD BUILDER =====
function mkSec(title, vs, icoPath, color, scrollable, badge, newIds = []) {
  const s = document.createElement('div'); s.className = 'section';
  const hdr = document.createElement('div'); hdr.className = 'sec-hdr';
  const newCount = newIds.length ? vs.filter(v => newIds.includes(v.id)).length : 0;
  hdr.innerHTML = `<div class="sec-title"><div class="sec-ico" style="background:${color}22;color:${color}"><svg viewBox="0 0 24 24">${icoPath}</svg></div>${x(title)}${badge ? `<span class="sec-badge">${x(badge)}</span>` : ''}${newCount > 0 ? `<span class="sec-new-badge">+${newCount} חדש</span>` : ''}</div><span class="sec-count">${vs.length} סרטונים</span>`;
  s.appendChild(hdr);
  const g = document.createElement('div'); g.className = 'vgrid' + (scrollable ? ' row' : '');
  vs.forEach((v, i) => g.appendChild(mkCard(v, i * 25, newIds.includes(v.id))));
  s.appendChild(g);
  return s;
}

function mkCard(v, delay, isNew = false) {
  const el = document.createElement('div');
  el.className = 'vcard' + (v.title ? '' : ' skel');
  el.style.animationDelay = delay + 'ms';
  if (!v.title) {
    el.innerHTML = `<div class="vthumb"></div><div class="vinfo"><div class="sa"></div><div class="vtxt"><div class="sl"></div><div class="sl s"></div></div></div>`;
    return el;
  }
  const col = PAL[Math.abs(hsh(v.channel || '')) % PAL.length];
  const init = (v.channel || '?').slice(0, 2).toUpperCase();
  const liked = likes.has(v.id);
  if (liked) el.classList.add('is-liked');
  const th = getChThumb(v.channelId);
  const avHTML = th
    ? `<img src="${x(th)}" alt="${x(v.channel)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;width:34px;height:34px;border-radius:50%;background:${col}22;color:${col};align-items:center;justify-content:center;font-size:12px;font-weight:700">${init}</span>`
    : `<span style="display:flex;width:34px;height:34px;border-radius:50%;background:${col}22;color:${col};align-items:center;justify-content:center;font-size:12px;font-weight:700">${init}</span>`;

  el.innerHTML = `
    <div class="vthumb">
      <img src="${v.thumb}" alt="${x(v.title)}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${v.id}/default.jpg'">
      <div class="vhover"></div>
      <div class="v-actions">
        <button class="va-btn modal-btn" title="פתח בחלונית"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></button>
        <button class="va-btn liked-btn${liked ? ' on' : ''}" data-id="${v.id}" title="אהבתי"><svg viewBox="0 0 24 24"><path d="${liked ? HEART_FULL : HEART_OUT}"/></svg></button>
        <button class="va-btn ext-btn" title="פתח ביוטיוב"><svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg></button>
      </div>
      <div class="liked-corner" style="display:${liked ? 'flex' : 'none'}"><svg viewBox="0 0 24 24"><path d="${HEART_FULL}"/></svg></div>
      ${isNew ? '<div class="vnew-badge">חדש</div>' : ''}
    </div>
    <div class="vinfo">
      <div class="vav" style="background:${col}22;color:${col}">${avHTML}</div>
      <div class="vtxt">
        <div class="vtitle">${x(v.title)}</div>
        <div class="vch"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>${x(v.channel)}</div>
        ${v.publishedAt ? `<div class="vdate">${fmtDate(v.publishedAt)}</div>` : ''}
        ${liked ? `<div class="vlabel"><svg viewBox="0 0 24 24"><path d="${HEART_FULL}"/></svg>אהבתי</div>` : ''}
      </div>
    </div>`;

  // Clicking anywhere on the card plays inline; modal-btn opens the big modal
  el.onclick = e => {
    if (e.target.closest('.va-btn') || e.target.closest('.vav')) return;
    playInCard(v, el.querySelector('.vthumb'));
  };
  el.querySelector('.modal-btn').addEventListener('click', e => { e.stopPropagation(); openModal(v); });
  el.querySelector('.ext-btn').addEventListener('click', e => { e.stopPropagation(); openYT(v); });
  el.querySelector('.liked-btn').addEventListener('click', e => { e.stopPropagation(); toggleLike(v.id); });
  el.querySelector('.vav').addEventListener('click', e => { e.stopPropagation(); pushNav(); filterChannel(v.channel); });
  el.oncontextmenu = e => showCtx(e, 'video', v.id, v.channel);
  return el;
}

function mkEmpty(t, s) {
  const d = document.createElement('div'); d.className = 'empty';
  d.innerHTML = `<div class="eico"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg></div><h3>${x(t)}</h3><p>${x(s)}</p>`;
  return d;
}

function showSkels() {
  const ct = document.getElementById('content'); ct.innerHTML = '';
  document.getElementById('hero').style.display = 'none';
  const g = document.createElement('div'); g.className = 'vgrid';
  for (let i = 0; i < 12; i++) g.appendChild(mkCard({ id: '_' + i, title: null }, i * 25));
  ct.appendChild(g);
}

function showErr(msg) {
  document.getElementById('content').innerHTML = `<div class="empty"><div class="eico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div><h3>שגיאה בטעינה</h3><p>${x(msg)}</p></div>`;
}

// ===== SIDEBAR =====
function buildSBChannels() {
  const w = document.getElementById('sb-chs'); w.innerHTML = '';
  const arr = [...followed].filter(ch => !blockedChannels.includes(ch));
  if (!arr.length) { const e = document.createElement('div'); e.className = 'sb-empty'; e.textContent = 'עוד לא עוקב'; w.appendChild(e); return; }
  arr.forEach(ch => {
    const c = PAL[Math.abs(hsh(ch)) % PAL.length];
    const hasNew = notifications.some(n => !n.read && n.channel === ch);
    const chId = chIdMap[ch];
    const th = getChThumb(chId);
    const el = document.createElement('div');
    el.className = 'chitem' + (channelFilter === ch ? ' active' : '');
    el.innerHTML = `<div class="chdot${hasNew ? ' hn' : ''}" style="background:${c}22;color:${c}">${th ? `<img src="${x(th)}" onerror="this.remove()">` : ch.slice(0, 2).toUpperCase()}<span class="ndot"></span></div><span class="chname">${x(ch)}</span>`;
    el.onclick = () => { pushNav(); filterChannel(ch); };
    el.oncontextmenu = e => showCtx(e, 'channel', null, ch);
    w.appendChild(el);
  });
}

// ===== NAVIGATION =====
function pushNav() {
  navHistory.push({ section, q, channelFilter });
}

function goBack() {
  if (!navHistory.length) return;
  const prev = navHistory.pop();
  section = prev.section; q = prev.q; channelFilter = prev.channelFilter;
  document.getElementById('search-input').value = q || '';
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('on'));
  const ni = document.getElementById('n-' + section);
  if (ni) ni.classList.add('on');
  syncChips(section);
  buildSBChannels(); renderAll();
}

function updateBackBtn() {
  const btn = document.getElementById('back-btn');
  if (btn) btn.classList.toggle('show', navHistory.length > 0 && (!!channelFilter || !!q));
}

function filterChannel(ch) {
  channelFilter = ch; q = ''; document.getElementById('search-input').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('on'));
  buildSBChannels(); renderAll();
}

function setSection(sec, el) {
  section = sec; channelFilter = ''; q = ''; document.getElementById('search-input').value = '';
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('on')); el.classList.add('on');
  syncChips(sec); buildSBChannels(); renderAll();
}

function chip(btn, sec) {
  section = sec; channelFilter = ''; q = ''; document.getElementById('search-input').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on')); btn.classList.add('on');
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('on'));
  const n = document.getElementById('n-' + sec); if (n) n.classList.add('on');
  renderAll();
}

function syncChips(sec) { document.querySelectorAll('.chip').forEach(c => { c.classList.toggle('on', (c.getAttribute('onclick') || '').includes(`'${sec}'`)); }); }
function toggleSB() { sbOpen = !sbOpen; document.getElementById('sidebar').classList.toggle('col', !sbOpen); document.getElementById('main').classList.toggle('col', !sbOpen); }

function goHome(e) {
  e.preventDefault(); navHistory = [];
  section = 'all'; channelFilter = ''; q = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  document.querySelector('.chip').classList.add('on');
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('on'));
  document.getElementById('n-all').classList.add('on');
  buildSBChannels(); renderAll();
}

// ===== SEARCH =====
let searchTimer;
function onSearchInput(v) {
  q = v.trim();
  clearTimeout(searchTimer);
  const drop = document.getElementById('search-drop');
  if (!q) { drop.classList.remove('show'); if (!channelFilter) renderAll(); return; }

  // Build suggestions: channels + titles
  const chMatches = [...new Set(vids.filter(vid => !blockedChannels.includes(vid.channel) && (vid.channel || '').toLowerCase().includes(q.toLowerCase())).map(vv => vv.channel))].slice(0, 4);
  const titleMatches = vids.filter(vid => !blockedVids.includes(vid.id) && (vid.title || '').toLowerCase().includes(q.toLowerCase())).slice(0, 4);

  let html = '';
  if (chMatches.length) {
    html += '<div class="sdrop-label">ערוצים</div>';
    html += chMatches.map(ch => `<div class="sdrop-item sdrop-ch"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>${x(ch)}</div>`).join('');
  }
  if (titleMatches.length) {
    html += '<div class="sdrop-label">סרטונים</div>';
    html += titleMatches.map(vv => `<div class="sdrop-item sdrop-vid" data-id="${vv.id}"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>${x(vv.title)}</div>`).join('');
  }

  if (html) {
    drop.innerHTML = html;
    drop.querySelectorAll('.sdrop-ch').forEach((el, i) => {
      el.onclick = () => { pushNav(); filterChannel(chMatches[i]); drop.classList.remove('show'); };
    });
    drop.querySelectorAll('.sdrop-vid').forEach(el => {
      const vid = vids.find(vv => vv.id === el.dataset.id);
      el.onclick = () => { drop.classList.remove('show'); if (vid) openModal(vid); };
    });
    drop.classList.add('show');
  } else {
    drop.classList.remove('show');
  }

  searchTimer = setTimeout(() => { if (q.length > 2) doSearch(); }, 1500);
}

function doSearch() {
  const v = document.getElementById('search-input').value.trim();
  if (!v) return;
  pushNav();
  q = v; channelFilter = '';
  document.getElementById('search-drop').classList.remove('show');
  searchYouTube(v);
}

function hardReload() {
  vids = []; chMap = {};
  section = 'all'; channelFilter = ''; q = '';
  navHistory = [];
  showSkels();
  if (followed.size > 0) fetchFollowedChannelsVideos(true);
  else searchYouTube('מוזיקה ישראלית חדשות בידור ספורט');
  toast('מרענן...');
}

function playAllLiked() {
  const lv = vids.filter(v => likes.has(v.id) && !blockedVids.includes(v.id) && !blockedChannels.includes(v.channel));
  if (lv.length) window.open(`https://www.youtube.com/watch_videos?video_ids=${lv.map(v => v.id).join(',')}`, '_blank');
}

// ===== UTILS =====
function hsh(s) { let r = 0; for (let i = 0; i < s.length; i++) r = ((r << 5) - r) + s.charCodeAt(i) | 0; return r; }
function x(s = '') { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
let _t;
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(_t); _t = setTimeout(() => t.classList.remove('show'), 2600); }
</script>
